# pulse-rate-limit.conf — Canonical GraphQL circuit-breaker threshold (GH#20638, t2768)
#
# Single source of truth for AIDEVOPS_PULSE_CIRCUIT_BREAKER_THRESHOLD.
# Previously defined in 4 places with inconsistent values:
#   pulse-wrapper.sh                    0.05  (wrong — fires too late, manual starts only)
#   pulse-rate-limit-circuit-breaker.sh 0.30  (correct)
#   plist-env-overrides.json.txt        0.30  (correct, launchd override)
#   AGENTS.md                           0.30  (docs)
# Consolidated here at GH#20638 / t2768 so all launch paths use the same value.
#
# Format: KEY=VALUE (no spaces around =, no quotes needed)
# Lines starting with # are comments.
# Sourceable by bash: source .agents/configs/pulse-rate-limit.conf
# Env var AIDEVOPS_PULSE_CIRCUIT_BREAKER_THRESHOLD takes precedence over this file —
# consumers check whether the env var is already set before sourcing.
#
# Change history:
#   0.05  Original value (t2690) — fired only after 95% of budget was already spent.
#         By then in-flight reads (issue list, pr view) were already failing with
#         RATE_LIMIT_EXHAUSTED. The 17 `pulse_dispatch_circuit_broken` fires observed
#         in pulse-stats.json were all at this threshold via manual pulse starts.
#   0.30  Raised (t2744) — fires at 30% remaining (1500/5000 points), preserving
#         headroom for in-flight worker reads and ops without REST equivalents.
#         Was only effective for launchd-started pulse (via plist-env-overrides.json.txt);
#         manual starts still used 0.05. Consolidated here (t2768).

# Fraction of total GraphQL budget below which the rate-limit circuit breaker trips.
# Set to 0 to disable entirely.
# Env var AIDEVOPS_PULSE_CIRCUIT_BREAKER_THRESHOLD takes precedence if already set.
AIDEVOPS_PULSE_CIRCUIT_BREAKER_THRESHOLD=0.30

# ── Cross-issue no_work rate circuit breaker (GH#20640, t2770) ────────────────
#
# Detects population-wide no_work storms (many DIFFERENT issues all returning
# no_work in a short window) symptomatic of cross-cutting infrastructure
# problems (auth outage, GraphQL exhaustion, wrapper stall recurrence).
#
# Complements the per-issue no_work breaker (GH#20639, t2769) — this one
# catches anomalies across the whole issue population, not a single issue.
#
# Mechanism: count fast_fail_record crash_type=no_work events in a rolling
# window. If count >= NO_WORK_WINDOW_MAX within NO_WORK_WINDOW_SECS, pause
# all dispatch for this cycle and emit one alert log line.
#
# State file: ~/.aidevops/logs/pulse-no-work-breaker.state
# Counter: pulse_dispatch_no_work_breaker_tripped in pulse-stats.json
#
# Env var overrides take precedence over these values:
#   AIDEVOPS_NO_WORK_WINDOW_SECS  — override rolling window duration
#   AIDEVOPS_NO_WORK_WINDOW_MAX   — override max events in window
#   AIDEVOPS_SKIP_NO_WORK_BREAKER=1 — emergency bypass (dispatch proceeds)

# Rolling window duration in seconds (default 10 minutes).
NO_WORK_WINDOW_SECS=600

# Maximum no_work events allowed within the window before the breaker trips.
# Set to 0 to disable entirely.
NO_WORK_WINDOW_MAX=10
