# pulse-rate-limit.conf — Canonical GraphQL circuit-breaker threshold (GH#20638, t2768)
#
# Single source of truth for AIDEVOPS_PULSE_CIRCUIT_BREAKER_THRESHOLD.
# Previously defined in 4 places with inconsistent values:
#   pulse-wrapper.sh                    0.05  (wrong — fires too late, manual starts only)
#   pulse-rate-limit-circuit-breaker.sh 0.30  (correct)
#   plist-env-overrides.json.txt        0.30  (correct, launchd override)
#   AGENTS.md                           0.30  (docs)
# Consolidated here at GH#20638 / t2768 so all launch paths use the same value.
#
# Format: KEY=VALUE (no spaces around =, no quotes needed)
# Lines starting with # are comments.
# Sourceable by bash: source .agents/configs/pulse-rate-limit.conf
# Env var AIDEVOPS_PULSE_CIRCUIT_BREAKER_THRESHOLD takes precedence over this file —
# consumers check whether the env var is already set before sourcing.
#
# Change history:
#   0.05  Original value (t2690) — fired only after 95% of budget was already spent.
#         By then in-flight reads (issue list, pr view) were already failing with
#         RATE_LIMIT_EXHAUSTED. The 17 `pulse_dispatch_circuit_broken` fires observed
#         in pulse-stats.json were all at this threshold via manual pulse starts.
#   0.30  Raised (t2744) — fires at 30% remaining (1500/5000 points), preserving
#         headroom for in-flight worker reads and ops without REST equivalents.
#         Was only effective for launchd-started pulse (via plist-env-overrides.json.txt);
#         manual starts still used 0.05. Consolidated here (t2768).
#   0.05  Lowered back (t2896) — the 0.30 raise rationale was "preserve headroom for
#         in-flight reads", but t2689 (read-side REST fallback) shipped after t2744
#         and now routes reads through the 5000/hr REST core pool when GraphQL is
#         low. Operational data over 4.5 days on the marcusquinn runtime: 43 fires
#         (~10/day, 40% in tight bursts) AND GraphQL still hit 0/5000 — the breaker
#         fires alongside exhaustion, not preventing it (in-flight reads are not
#         throttled by the breaker). Cost prevented: ~$30-70/yr. Cost of reservation:
#         25% of dispatch budget unavailable (36,000 points/day reserved). With
#         REST fallback for both reads (t2689) and writes (t2574), the GraphQL
#         reserve is now mostly preserved for a small set of GraphQL-only mutations
#         (`addSubIssue` etc.) plus next-pulse-cycle recovery — neither needs 1500
#         points. 0.05 restores original t2690 emergency-floor value: still fires in
#         genuine exhaustion (last 250 points), recovers ~25% of dispatch budget
#         for productive work. Trivial revert path if the lower threshold masks
#         real failures (set back to 0.30 here, redeploy).

# Fraction of total GraphQL budget below which the rate-limit circuit breaker trips.
# Set to 0 to disable entirely.
# Env var AIDEVOPS_PULSE_CIRCUIT_BREAKER_THRESHOLD takes precedence if already set.
AIDEVOPS_PULSE_CIRCUIT_BREAKER_THRESHOLD=0.05

# ── Cross-issue no_work rate circuit breaker (GH#20640, t2770) ────────────────
#
# Detects population-wide no_work storms (many DIFFERENT issues all returning
# no_work in a short window) symptomatic of cross-cutting infrastructure
# problems (auth outage, GraphQL exhaustion, wrapper stall recurrence).
#
# Complements the per-issue no_work breaker (GH#20639, t2769) — this one
# catches anomalies across the whole issue population, not a single issue.
#
# Mechanism: count fast_fail_record crash_type=no_work events in a rolling
# window. If count >= NO_WORK_WINDOW_MAX within NO_WORK_WINDOW_SECS, pause
# all dispatch for this cycle and emit one alert log line.
#
# State file: ~/.aidevops/logs/pulse-no-work-breaker.state
# Counter: pulse_dispatch_no_work_breaker_tripped in pulse-stats.json
#
# Env var overrides take precedence over these values:
#   AIDEVOPS_NO_WORK_WINDOW_SECS  — override rolling window duration
#   AIDEVOPS_NO_WORK_WINDOW_MAX   — override max events in window
#   AIDEVOPS_SKIP_NO_WORK_BREAKER=1 — emergency bypass (dispatch proceeds)

# Rolling window duration in seconds (default 10 minutes).
NO_WORK_WINDOW_SECS=600

# Maximum no_work events allowed within the window before the breaker trips.
# Set to 0 to disable entirely.
NO_WORK_WINDOW_MAX=10

# ── Wall-clock timeouts for gh CLI invocations (t2913) ────────────────────────
#
# `gh` (Go HTTP client) does not apply a default request timeout, so a wedged
# TCP connection (DNS, TLS, mid-stream stall) can hang indefinitely. Observed:
# 7+ minute hang on `gh issue list` for one repo blocking all subsequent repos
# in stats-health-dashboard.sh's update loop (Ultimate-Multisite/gratis-ai-agent#1192).
#
# The framework's only mechanism is coreutils `timeout` wrapping the `gh`
# subprocess. shared-gh-wrappers.sh routes all wrapped reads/REST-translator
# `gh api` calls through `_gh_with_timeout` so every consumer benefits from
# one chokepoint, and the t2689 / t2772 REST fallback path is preserved
# (timeout wraps both primary GraphQL and REST-fallback inner calls).
#
# Operation-class split rationale:
#   - Reads (gh issue view/list, gh pr list, gh api GET) are idempotent and
#     normally complete in <2s (p99 ~5s on healthy days, ~10s during incidents).
#     15s = ~3× p99, leaving headroom for slow API days while catching wedges
#     well before the 30s leaf-level value PR #21038 used. Safe to retry — but
#     retry logic is deliberately NOT included here (separate concern).
#   - Writes (gh issue edit/create/comment, gh pr edit/merge) are non-idempotent
#     and legitimately slower (validation + webhook fanout, p99 ~10-15s). 45s
#     gives 3× headroom because writes CANNOT be safely retried — a duplicate
#     comment is worse than a slow one.
#
# Env var overrides take precedence over these values:
#   AIDEVOPS_GH_READ_TIMEOUT  — seconds for read ops (default 15)
#   AIDEVOPS_GH_WRITE_TIMEOUT — seconds for write ops (default 45)
#
# To disable timeouts entirely (debug only): set both to a very large value
# like 86400. Setting to 0 has no special meaning — `timeout 0` returns
# immediately on coreutils.

# Wall-clock seconds before a wrapped `gh` read returns with rc=124.
AIDEVOPS_GH_READ_TIMEOUT=15

# Wall-clock seconds before a wrapped `gh` write returns with rc=124.
AIDEVOPS_GH_WRITE_TIMEOUT=45

# ── L1 events ETag tickle (t2830, GH#20868) ───────────────────────────────────
#
# Inserts a cheap REST conditional GET above the L3 batch prefetch layer.
# Sends a stored ETag via If-None-Match to /users/{owner}/events or
# /orgs/{owner}/events. A 304 Not Modified response costs 0 rate-limit points
# and allows the two Search API calls for that owner to be skipped entirely.
#
# Expected impact: ~80% of pulse cycles see 304 on all owners = 0 search calls.
# Active work periods (events changed): tickle returns 200, batch search runs
# as today.
#
# Uses the REST core rate-limit pool (5000/h), completely independent of the
# GraphQL quota — no risk of triggering the circuit breaker.
#
# ETag cache: ~/.aidevops/cache/pulse-events-etag/{owner}.json
# Counter: pulse_events_tickle_fresh / pulse_events_tickle_stale in pulse-stats.json
#
# Set to 0 to disable the tickle and always run batch search unconditionally.
# Env var PULSE_EVENTS_TICKLE_ENABLED takes precedence if already set.
PULSE_EVENTS_TICKLE_ENABLED=1
