# repo-verify-defaults.conf — Fallback verify commands by toolchain (t3224)
# SPDX-License-Identifier: MIT
# SPDX-FileCopyrightText: 2025-2026 Marcus Quinn
#
# Read by .agents/hooks/repo-verify-pre-push.sh as the THIRD-PRIORITY source
# of verify commands, after .aidevops.json `.verify` and package.json scripts.
# Reach this fallback only when the repo declares neither.
#
# Format: one record per toolchain, fields separated by | (pipe).
#
#   TOOLCHAIN | EVIDENCE_PREDICATE | FORMAT | FORMAT_FIX | LINT | LINT_FIX | TYPECHECK
#
# TOOLCHAIN: short identifier reported in [repo-verify][INFO] logs.
#
# EVIDENCE_PREDICATE: `file:PATH` requires a tracked file; `contains:PATH:TEXT`
#   additionally requires literal committed configuration evidence.
#   First-match-wins, so place stronger/more specific predicates first.
#
# FORMAT / FORMAT_FIX / LINT / LINT_FIX / TYPECHECK: commands to run from
#   repo root. A literal `-` means "no command for this slot". An empty value
#   (consecutive `||`) is also treated as "no command".
#
# Lines beginning with # are comments. Blank lines ignored.
#
# Why Node ecosystems are NOT in this file:
# Node repos are detected from package.json by repo-verify-config-lib.sh,
# which reads `.scripts.{format,lint,typecheck}` directly. Inventing `pnpm
# run format` here when no `format` script is declared would fail the npm
# script lookup. Node fallbacks belong in `.aidevops.json .verify` per-repo.

# Rust: cargo fmt + clippy + check
RUST_CARGO | file:Cargo.toml | cargo fmt --all -- --check | cargo fmt --all | cargo clippy --all-targets -- -D warnings | cargo clippy --all-targets --fix --allow-dirty --allow-staged | cargo check --all-targets

# Go: gofmt + vet (no fix-on-check distinction for vet)
GO_MOD | file:go.mod | test -z "$(gofmt -l .)" | gofmt -w . | go vet ./... | - | -

# Python (Ruff): require committed Ruff configuration, not merely pyproject.toml.
PYTHON_RUFF | contains:pyproject.toml:[tool.ruff] | ruff format --check . | ruff format . | ruff check . | ruff check --fix . | -

# Python Black: require committed Black configuration. setup.py alone is not evidence.
PYTHON_BLACK | contains:pyproject.toml:[tool.black] | black --check . | black . | - | - | -

# Python Flake8: require a committed Flake8 configuration file.
PYTHON_FLAKE8 | file:.flake8 | - | - | flake8 . | - | -
