# Qlty maintainability smell baseline (t2065, GH#18773). Seed value for
# the `.github/workflows/qlty-regression.yml` gate. The gate itself uses
# a base-vs-head diff (not this threshold directly), but anchoring the
# ratchet here gives t2067 (ratchet-down discipline) a starting point.
# Baseline: 109 (2026-04-14, measured against main with
# `qlty smells --all --sarif | jq '.runs[0].results | length'`).
# Ratcheted down to 22 (refactor/qlty-a-grade): 39→20 smells via function-level
# fixes (SyncContext, consolidated returns, decomposed parseDelimitedRow, config-hook
# substeps, LikePostsConfig dataclass, quality-hooks extraction) + file splits
# (toon-parser.ts, toon-utils.ts, agent-mcp-tools.mjs, observability-sqlite.mjs,
# exec-commands.ts, logger.ts, router.ts, start.ts, pageindex_helpers.py,
# email_frontmatter_utils.py, manifest_collectors.py). 20 actual + 2 buffer.
# Bumped to 29 (GH#19223, t2127): decomposed 4 higgsfield .mjs files (commands/video/
# common/image) into 12 focused modules. The decomposition is code-preserving (verbatim
# function moves) — no new logic. Per-file complexity dropped (e.g., commands 334→0,
# video 297→79, common 283→74) but more files now exceed the ~50 file-complexity
# threshold. Total complexity across higgsfield unchanged; qlty counts more files.
# 27 actual + 2 buffer = 29. Follow-up: reduce per-function complexity in the
# higgsfield modules to bring individual files under the threshold.
QLTY_SMELL_THRESHOLD=29

# Qlty smell-count → grade mapping (t2066, GH#18774)
#
# The daily quality sweep (stats-quality-sweep.sh:_sweep_qlty) uses the local
# SARIF smell count as the primary grade source. The cloud badge at
# qlty.sh/gh/OWNER/REPO/maintainability.svg is lag-prone and sometimes 404s,
# so it is captured as secondary telemetry only — never the primary grade.
#
# These thresholds are the UPPER BOUND (inclusive) for each grade bucket.
# Smell counts greater than QLTY_GRADE_D_MAX fall into grade F.
#
# Baseline (2026-04-14): 109 smells in aidevops repo, aiming for A at ≤20.
# Proportional to current distribution; ratchet-able as smells decrease.
# Tighten these numbers (smaller max values) as the repo improves to
# pressure continued cleanup — same ratchet discipline as the shell thresholds.
QLTY_GRADE_A_MAX=20
QLTY_GRADE_B_MAX=45
QLTY_GRADE_C_MAX=90
QLTY_GRADE_D_MAX=150
