# Complexity thresholds for CI quality gates (GH#5628)
#
# These values are read by .github/workflows/code-quality.yml.
# After each batch of simplification-debt PRs merges, lower these
# thresholds to ratchet down complexity over time.
#
# Format: KEY=VALUE (no spaces around =, no quotes needed)
# Lines starting with # are comments.

# Shell function complexity: functions with >100 lines
# Current baseline: 404 (as of 2026-03-24)
FUNCTION_COMPLEXITY_THRESHOLD=420

# Shell nesting depth: files with >8 levels of nesting
# Current baseline: 262 (as of 2026-04-01, +1 for complexity-scan-helper.sh GH#15285)
# Note: orchestration-efficiency-collector.sh (GH#15316) also adds 1 violation;
# threshold already at 262 from GH#15285 so no further bump needed.
NESTING_DEPTH_THRESHOLD=262

# File size: files with >1500 lines
# Current baseline: 53 (as of 2026-03-25, pre-existing on main)
FILE_SIZE_THRESHOLD=53
