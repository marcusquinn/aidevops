# Qlty smell-count → grade mapping (t2066, GH#18774)
#
# The daily quality sweep (stats-quality-sweep.sh:_sweep_qlty) uses the local
# SARIF smell count as the primary grade source. The cloud badge at
# qlty.sh/gh/OWNER/REPO/maintainability.svg is lag-prone and sometimes 404s,
# so it is captured as secondary telemetry only — never the primary grade.
#
# These thresholds are the UPPER BOUND (inclusive) for each grade bucket.
# Smell counts greater than QLTY_GRADE_D_MAX fall into grade F.
#
# Baseline (2026-04-14): 109 smells in aidevops repo, aiming for A at ≤20.
# Proportional to current distribution; ratchet-able as smells decrease.
# Tighten these numbers (smaller max values) as the repo improves to
# pressure continued cleanup — same ratchet discipline as the shell thresholds.
QLTY_GRADE_A_MAX=20
QLTY_GRADE_B_MAX=45
QLTY_GRADE_C_MAX=90
QLTY_GRADE_D_MAX=150
