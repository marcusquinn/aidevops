# Complexity thresholds for CI quality gates (GH#5628)
#
# These values are read by .github/workflows/code-quality.yml.
# After each batch of simplification-debt PRs merges, lower these
# thresholds to ratchet down complexity over time.
#
# Format: KEY=VALUE (no spaces around =, no quotes needed)
# Lines starting with # are comments.

# Shell function complexity: functions with >100 lines
# Current baseline: 404 (as of 2026-03-24)
FUNCTION_COMPLEXITY_THRESHOLD=420

# Shell nesting depth: files with >8 levels of nesting
# Checker rewritten (refactor/nesting-checker) to fix systemic false positives:
#   - Resets depth at function boundaries (was accumulating across all functions)
#   - Skips heredoc content (was counting keywords in awk/AppleScript/etc.)
#   - Uses word-level matching (was matching "if" inside "elif", strings, etc.)
# Previous threshold was 276 with the broken checker (278 violations at failure).
# Accurate checker baseline: 34 violations (as of 2026-04-06).
NESTING_DEPTH_THRESHOLD=34

# File size: files with >1500 lines
# Current baseline: 53 (as of 2026-03-25, pre-existing on main)
FILE_SIZE_THRESHOLD=53

# Bash 3.2 compatibility: "\n"/"\t" in double-quoted strings, associative
# arrays (bash 4.0+), and namerefs (bash 4.3+). GH#17371.
# Current baseline: 69 (as of 2026-04-04, mostly namerefs in helper scripts)
BASH32_COMPAT_THRESHOLD=69
