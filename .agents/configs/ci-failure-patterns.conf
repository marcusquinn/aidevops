# ci-failure-patterns.conf — Declarative registry for CI-failure pattern detection (t3225)
# SPDX-License-Identifier: MIT
# SPDX-FileCopyrightText: 2025-2026 Marcus Quinn
#
# Used by _classify_ci_failures_by_pattern + _emit_ci_failure_guidance_blocks
# in pulse-merge-feedback.sh. When a worker PR develops failing CI and the
# pulse routes the failure to the linked issue, this registry maps the
# failing-check NAMES (not file paths) to canonical resolution guidance.
#
# Format: one record per pattern, fields separated by | (pipe), no leading/trailing whitespace.
#
#   CLASSIFICATION | NAME_PATTERN | RESOLUTION_COMMAND | GUIDANCE_TEXT
#
# CLASSIFICATION:
#   FORMAT_FAILURE    — Auto-fixable formatting failure (Prettier, Biome, gofmt, cargo fmt, Black, ruff format).
#   LINT_FAILURE      — Auto-fixable lint failure (ESLint --fix, Clippy --fix, ruff --fix, Biome --apply).
#   EXTERNAL_STATIC_ANALYSIS — External advisory/static-analysis provider failure; read provider details URL first.
#   TYPECHECK_FAILURE — Type-checking failure. NEVER auto-fixed — semantic, requires code change.
#   TEST_FAILURE     — Test failure. Diagnose harness/env bootstrap vs code regression first.
#   TIMEOUT_NO_OUTPUT — Required check timed out, was killed, or lost runner communication.
#   OTHER             — Catch-all. No guidance block emitted (falls through to generic worker guidance).
#
# NAME_PATTERN: extended glob matched against the check name as reported by `gh pr checks`.
#   - Patterns use bash `case "$name" in $pattern) ... esac` semantics.
#   - Use character classes ([Ff]) for case-insensitivity.
#   - Patterns are tried in conf-file order; first match wins.
#
# RESOLUTION_COMMAND: short command hint embedded in the guidance block (single line).
#
# GUIDANCE_TEXT: multi-line guidance. Use \n for newlines within the field.
#   No placeholders required — the failing-check listing is provided separately
#   in the feedback section (see _build_ci_feedback_section).
#
# Lines beginning with # are comments. Blank lines are ignored.
# The OTHER entry is a catch-all and MUST be last. It emits NO guidance —
# falls through to the standard "Worker guidance" block already present in
# the feedback section.

# --- FORMAT_FAILURE: auto-fixable formatting checks ---
FORMAT_FAILURE | *[Ff]ormat* | format --write OR format --fix | Format checks fail when code does not match the project's style rules. The fix is mechanical — run the project's format command and amend.\n\n**Auto-fix sequence (try this FIRST, before any code change):**\n\n1. `cd` into the worktree the previous worker created (the failing PR's branch).\n2. Discover the project's format-fix command:\n   - Check `.aidevops.json` `verify.format_fix` first.\n   - Else look in `package.json` `scripts` for `format`, `format:fix`, `format-fix`, `fmt`, `prettier`, or `biome` entries — prefer entries that include `--write`, `--fix`, or `--apply`.\n   - Else fall back to toolchain defaults: `cargo fmt --all` (Rust), `gofmt -w .` (Go), `ruff format .` or `black .` (Python).\n3. Run the format command: `<format-fix-command>`.\n4. Stage and amend: `git add -A && git commit --amend --no-edit`.\n5. Force-push with lease: `git push --force-with-lease`.\n6. Wait ~60s, re-check CI. If green, you are DONE — no other change needed.\n7. ONLY if format-fix did not resolve the failure (or did not apply because the project lacks a format command), proceed with the standard task body.

FORMAT_FAILURE | *[Pp]rettier* | pnpm format --write OR npx prettier --write . | Prettier checks fail when files don't match project style. Use the FORMAT_FAILURE auto-fix sequence above. Prefer `pnpm format --write` (or `npm run format -- --write` / `yarn format --write`) when defined; fall back to `npx prettier --write .` if no project script exists.

FORMAT_FAILURE | *[Bb]iome* | pnpm biome format --write . | Biome covers both formatting and lint in one tool. Use the FORMAT_FAILURE auto-fix sequence above with `pnpm biome format --write .` or `pnpm biome check --apply .` (the latter also fixes lint findings).

FORMAT_FAILURE | *gofmt* | gofmt -w . | gofmt failures are mechanical. Run `gofmt -w .` from the repo root (or `goimports -w .` if the project uses goimports), commit-amend, force-push.

FORMAT_FAILURE | *cargo*fmt* | cargo fmt --all | `cargo fmt --all` fixes Rust formatting. Run from the workspace root, commit-amend, force-push.

FORMAT_FAILURE | *[Bb]lack* | black . | Python Black is mechanical. Run `black .` from repo root, commit-amend, force-push.

# --- LINT_FAILURE: auto-fixable lint checks ---
LINT_FAILURE | *[Ll]int* | lint --fix; if local package lint passed, run node .github/scripts/lint-changed-files.mjs --base-ref <base> | Many lint failures are auto-fixable. Try the lint-fix command BEFORE attempting code changes.\n\n**Auto-fix sequence (try this FIRST):**\n\n1. `cd` into the worktree.\n2. Discover the project's lint-fix command:\n   - Check `.aidevops.json` `verify.lint_fix` first.\n   - Else look in `package.json` `scripts` for `lint:fix`, `lint-fix`, `lint -- --fix`, or run `pnpm lint --fix` / `npm run lint -- --fix` directly.\n   - Else toolchain defaults: `cargo clippy --fix --allow-dirty --allow-staged` (Rust), `ruff check --fix .` (Python).\n3. Run it. Many lint rules (unused vars, formatting-adjacent rules, ordering) auto-fix.\n4. `git add -A && git commit --amend --no-edit && git push --force-with-lease`.\n5. Wait ~60s, re-check CI.\n6. If CI lint still fails after local package lint passed, reproduce the CI changed-file path before editing more: `node .github/scripts/lint-changed-files.mjs --base-ref <base>` (use the PR base branch or merge-base). Changed-file ESLint can run before generated type artifacts exist, so package lint after type generation is not equivalent.\n7. If lint still fails, the remaining findings need code changes. Read the failure URLs in the failing-checks list above for specific rule names and locations.\n\nGenerated-type trap: when changed files depend on generated Content Collections or route/content types, avoid unused blanket eslint disables. Prefer runtime validation, local schemas, or typed wrappers that lint clean before generated artifacts exist.\n\nTimeout/no-output trap: if the failing lint log is mostly silent, reports runner communication loss, or exits 124/137/143, add heartbeat logging around the long lint command before repeated reruns so the next log distinguishes timeout/kill/no-output from real lint diagnostics.\n\nNote: some "Lint" check names (e.g. `Stat Portability Lint`, `Counter-Stack Lint`) are framework-specific scanners that don't auto-fix. If lint --fix is a no-op, fall through to standard task body.

LINT_FAILURE | *ESLint* | pnpm lint --fix OR npx eslint --fix .; if CI-only, node .github/scripts/lint-changed-files.mjs --base-ref <base> | ESLint --fix handles a large fraction of findings (semicolons, unused vars, ordering). Try first per LINT_FAILURE sequence. If package lint passes locally but CI changed-file ESLint fails, run `node .github/scripts/lint-changed-files.mjs --base-ref <base>` to mirror the CI pre-generation lint path before adding suppressions.

EXTERNAL_STATIC_ANALYSIS | *CodeFactor* | read the CodeFactor details URL, reproduce locally with the nearest lint/style/static-analysis command, then add a focused regression guard | CodeFactor is an external advisory/static-analysis check, so GitHub Actions logs usually do not contain the finding. Open the failing check's details URL from the failing-checks list, identify the reported rule and file, reproduce it locally with the nearest project linter or style checker, fix the source issue rather than suppressing the provider, and add a focused regression guard when the same signature repeats across PRs. Treat repeated `failure:codefactor.io` clusters as a source-quality pattern, not a runner outage.

LINT_FAILURE | *[Cc]lippy* | cargo clippy --fix --allow-dirty --allow-staged | Clippy --fix auto-applies many suggestions. Workspaces: add `--workspace`. Some Clippy lints require manual changes — fall through if --fix doesn't resolve.

LINT_FAILURE | *ruff* | ruff check --fix . | Ruff is fast and most findings are auto-fixable. Run `ruff check --fix .` from the project root.

# --- TYPECHECK_FAILURE: NEVER auto-fixed (semantic) ---
TYPECHECK_FAILURE | *[Tt]ypecheck* | <code change required> | Typecheck failures indicate type errors that require CODE CHANGES — never auto-fix or "auto-add types" via tooling. Read the failing check URL above for the exact type errors and locations.\n\n**Approach:**\n\n1. Read the typecheck error log from the failing-check URL.\n2. Locate each error's `file:line` reference.\n3. Fix each error by reading the surrounding code, understanding the intended types, and adjusting either the implementation or the type annotations.\n4. NEVER suppress with `// @ts-ignore`, `as any`, `# type: ignore`, etc., unless the issue body explicitly authorises it.\n5. Re-run the project's local typecheck to confirm green before pushing.

TYPECHECK_FAILURE | *tsc* | <code change required> | TypeScript compiler errors require code changes. See TYPECHECK_FAILURE guidance above. Run the project's typecheck script locally (e.g. `pnpm tsc --noEmit` or `pnpm check-types`) to iterate.

TYPECHECK_FAILURE | *mypy* | <code change required> | mypy errors require code changes. See TYPECHECK_FAILURE guidance above.

# --- TEST_FAILURE: diagnose hermeticity before code changes ---
TEST_FAILURE | *[Tt]est* | pnpm test and pnpm --filter <package> test | Test failures are not automatically code regressions. First separate application defects from test-harness and clean-preflight hermeticity failures.\n\n**JS/TS pnpm + Vitest hermeticity triage:**\n\n1. Read the failing check log and identify the first failing package/suite.\n2. Re-run the repo gate, then isolate with package filters: `pnpm test` and `pnpm --filter <package> test`.\n3. If failures mention missing env variables, import-time env validation, `process.env`, zod/env schemas, or private configuration, fix the test setup so unit tests use safe defaults/mocks. Do NOT require production secrets.\n4. If failures mention Vitest mocks (`vi.mock`, `@workspace/*`, missing exports, schema constants), inspect stale mocks and prefer partial mocks with `vi.importActual` where possible.\n5. Keep changes test-only unless the log proves a production code regression.\n6. Re-run the package-level test and the repo-level test before pushing.\n\n**E2E policy:** First check whether the target branch requires E2E. On develop-style branches where E2E is advisory, keep the original PR moving when core gates are green and file a focused follow-up with the failing spec, artifact/check URL, expected vs actual behaviour, and verification command. On staging/release branches where E2E is required, fix or explicitly quarantine the failing path before merge. See `.agents/reference/ci-gate-policy.md`.

# --- TIMEOUT_NO_OUTPUT: silent long-running required checks ---
TIMEOUT_NO_OUTPUT | *[Tt]imeout* | wrap the long command with periodic heartbeat output | A timeout/no-output failure is not enough evidence to blame application code. Before repeatedly rerunning the same silent required check, add heartbeat logging around the long-running command so the next CI log distinguishes timeout, kill, runner communication loss, memory pressure, and real diagnostics.\n\n**Heartbeat sequence:**\n\n1. Identify the long command inside the failing required check.\n2. Wrap it with periodic output (for example, every 30-60s) that prints the command label, elapsed seconds, and timeout budget.\n3. Preserve the child command exit status and report whether it was a timeout/killed status such as 124, 137, or 143.\n4. Keep the wrapper temporary or narrowly scoped unless the project already has a reusable CI helper.\n5. Re-run once with heartbeat output, then diagnose from the clearer log instead of guessing from silence.
TIMEOUT_NO_OUTPUT | *[Ww]atchdog* | wrap the long command with periodic heartbeat output | Watchdog/no-output failures need heartbeat evidence before repair work. Use the TIMEOUT_NO_OUTPUT heartbeat sequence above and preserve exit codes such as 124, 137, and 143.
TIMEOUT_NO_OUTPUT | *[Rr]unner*communication* | wrap the long command with periodic heartbeat output | Runner communication-loss symptoms need heartbeat evidence before repair work. Use the TIMEOUT_NO_OUTPUT heartbeat sequence above and preserve exit codes such as 124, 137, and 143.

# --- OTHER: catch-all (NO guidance emitted) ---
OTHER | * | <see failing check URLs> | Generic CI failure — no specific auto-fix pattern matched. Read the failing-check URLs in the failing-checks list above and follow the standard worker guidance below.
