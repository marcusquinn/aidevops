# conflict-patterns.conf — Declarative registry for conflict-pattern detection (t2987)
# SPDX-License-Identifier: MIT
# SPDX-FileCopyrightText: 2025-2026 Marcus Quinn
#
# Format: one record per pattern, fields separated by | (pipe), no leading/trailing whitespace.
#
#   CLASSIFICATION | GLOB_PATTERN | RESOLUTION_COMMAND | GUIDANCE_TEXT
#
# CLASSIFICATION:
#   DRIZZLE_MIGRATION — Drizzle migration meta file (index collision, sequential numbering)
#   LOCKFILE          — Regenerate-only (pnpm-lock.yaml, package-lock.json, yarn.lock, bun.lockb)
#   I18N_JSON         — i18n translation JSON (union-mergeable via jq)
#   GENERATED         — Generated/snapshot files (always regenerate, never hand-merge)
#   CODE              — Source code with semantic conflict (hand-resolve required)
#
# GLOB_PATTERN: extended glob matched against the basename or relative path of the conflicting file.
#   - Patterns are matched with bash `[[ "$file" == $pattern ]]` extended-glob semantics.
#   - Multiple patterns for the same classification are listed as separate records.
#
# RESOLUTION_COMMAND: short command hint embedded in the guidance block (single line, no newlines).
#   Placeholders: {default_branch} is replaced with the actual default branch at emit time.
#
# GUIDANCE_TEXT: multi-line guidance. Use \n for newlines within the field.
#   Placeholders: {default_branch}, {file} (matched file, for single-file patterns).
#
# Lines beginning with # are comments. Blank lines are ignored.
# The CODE entry is a catch-all and must be last (it has no GUIDANCE_TEXT emission — it
# falls through to the generic worker-guidance block already present in the feedback section).

DRIZZLE_MIGRATION | */migrations/meta/_journal.json | pnpm --filter <db-pkg> db:generate | The conflict files indicate Drizzle migration index collisions. Workers always emit the next sequential index (e.g. 0084) but by the time the PR is reviewed/merged the default branch has consumed that number.\n\nResolution (verbatim):\n\n1. Rebase your branch on origin/{default_branch}:\n   `git fetch origin && git rebase origin/{default_branch}`\n2. Identify the next available idx in {default_branch}'s journal:\n   `git show origin/{default_branch}:packages/db/migrations/meta/_journal.json | jq '.entries | sort_by(.idx) | last'`\n3. Renumber YOUR migration SQL + snapshot to idx+1.\n4. Regenerate canonical schema state:\n   `pnpm --filter <db-pkg> db:generate`\n5. The new snapshot incorporates {default_branch}'s recent migrations.\n\nWARNING: do NOT manually merge snapshot content from both sides. Snapshots are cumulative (not deltas). Delete your snapshot, rename SQL, regenerate.

DRIZZLE_MIGRATION | */migrations/meta/*_snapshot.json | pnpm --filter <db-pkg> db:generate | Same as _journal.json conflict — snapshot index collision. See the _journal.json guidance above. Do NOT hand-merge snapshot content. Delete, renumber, regenerate.

LOCKFILE | pnpm-lock.yaml | pnpm install --no-frozen-lockfile | Lockfile conflicts are always resolved by regeneration — never by hand-merging. The lockfile is a deterministic output of package.json.\n\nResolution:\n\n1. Rebase your branch on origin/{default_branch}:\n   `git fetch origin && git rebase origin/{default_branch}`\n2. Accept either version of the lockfile (the content doesn't matter — it will be replaced):\n   `git checkout --ours pnpm-lock.yaml` or `git checkout --theirs pnpm-lock.yaml`\n3. Regenerate:\n   `pnpm install --no-frozen-lockfile`\n4. Stage the regenerated lockfile:\n   `git add pnpm-lock.yaml && git rebase --continue`

LOCKFILE | package-lock.json | npm install | Same approach as pnpm-lock.yaml — accept one side, regenerate with `npm install`. Do NOT hand-merge.

LOCKFILE | yarn.lock | yarn install | Same approach as pnpm-lock.yaml — accept one side, regenerate with `yarn install`. Do NOT hand-merge.

LOCKFILE | bun.lockb | bun install | Same approach as pnpm-lock.yaml — accept one side, regenerate with `bun install`. Do NOT hand-merge.

I18N_JSON | */i18n/src/translations/*/*.json | jq -s '.[0] * .[1]' | i18n translation JSON files are mechanically union-mergeable. Both sides add keys — the merged result should contain all keys from both sides.\n\nResolution:\n\n1. Rebase your branch on origin/{default_branch}:\n   `git fetch origin && git rebase origin/{default_branch}`\n2. During rebase conflict, collect both sides and union-merge:\n   `git show HEAD:{file} > /tmp/theirs.json`\n   `git show REBASE_HEAD:{file} > /tmp/ours.json`\n   `jq -s '.[0] * .[1]' /tmp/theirs.json /tmp/ours.json > {file}`\n3. Stage and continue:\n   `git add {file} && git rebase --continue`\n\nVerify: the merged file should contain all keys from both sides and be valid JSON.

I18N_JSON | */translations/*/*.json | jq -s '.[0] * .[1]' | Same as above — i18n translation JSON union-merge. See guidance above.

GENERATED | *_snapshot.json | <regenerate via project toolchain> | Snapshot files are generated artifacts. Hand-merging snapshot content corrupts the snapshot chain.\n\nResolution:\n\n1. Rebase your branch on origin/{default_branch}.\n2. Delete conflicting snapshot file(s).\n3. Run the project's generation command (see package.json scripts).\n4. Stage the newly generated snapshot.\n\nDo NOT attempt to manually merge snapshot content.

GENERATED | *.generated.ts | <run codegen> | Generated TypeScript files must be regenerated from source, not hand-merged. Run the project codegen script and stage the output.

GENERATED | *.generated.graphql | <run codegen> | Generated GraphQL files must be regenerated from source. Run the project codegen script.

ADD_ADD_NEW_FILE | __SPECIAL_ADD_ADD__ | git checkout --ours <path> && git add <path> && git rebase --continue | Both your PR and a previously-merged PR added the same new file (`add/add` conflict during rebase). The version on `{default_branch}` was merged first and is canonical.\n\nResolution (verbatim):\n\n1. Identify the conflicting files (git status shows them as `AA`):\n   `git status --porcelain | awk '/^AA / {print $2}'`\n2. For each `add/add` file, accept `{default_branch}`'s version (the first-merged one):\n   `git checkout --ours <path> && git add <path>`\n   Note: during rebase, `--ours` refers to the rebased-onto branch (`origin/{default_branch}`), `--theirs` refers to the commit being applied (your branch). This is REVERSED from a normal merge.\n3. Continue the rebase:\n   `git rebase --continue`\n4. If your version had unique additions not in `{default_branch}`'s version, append them in a FOLLOW-UP commit on top of the resolved rebase. Do NOT try to combine both versions inline during conflict resolution — a clean append commit is auditable; inline combining is error-prone.\n\nWARNING: do NOT cherry-pick the original commit — it will recreate the same `add/add` conflict. The conflict is structural (both branches created the file from nothing), not semantic.\n\nThe `__SPECIAL_ADD_ADD__` glob is a sentinel — `add/add` files are detected via `git status --porcelain` (`AA` rows), independent of filename, NOT via filename glob.

CODE | * | <hand-resolve> | Source code conflict — semantic overlap requires manual resolution. Review both sides, understand the intent of each change, and produce a merged result that satisfies both.
