# prompt-hook-candidates.conf — Registry for migrating prompt rules to deterministic hooks (t3246)
# SPDX-License-Identifier: MIT
# SPDX-FileCopyrightText: 2025-2026 Marcus Quinn
#
# Purpose: keep the always-loaded AGENTS.md prompt focused on reasoning and
# safety invariants while deterministic rules move into hooks, CI checks, or
# validators. Every deterministic inline rule should have either an enforcing
# script/check or an explicit migration plan here.
#
# Format: one record per prompt rule, fields separated by | (pipe), no leading/trailing whitespace.
#
#   SECTION | CLASS | ENFORCEMENT | STATUS | INLINE_BUDGET | REFERENCE | NOTES
#
# CLASS:
#   deterministic — machine-checkable syntax/file/CLI policy; should migrate to hooks.
#   hybrid        — has deterministic enforcement plus judgment context; keep a short inline invariant.
#   security      — security invariant; keep inline even when scanners also exist.
#   judgment      — model reasoning policy; usually stays inline and may get helper support only.
#
# STATUS:
#   hooked      — deterministic enforcement exists and the prompt should be a short pointer.
#   partial     — some enforcement exists; prompt keeps an inline invariant and points to detail.
#   candidate   — migration is planned but not implemented yet; keep prompt detail until hooked.
#   prompt-only — intentionally prompt-level; use only for judgment/security rules.
#
# INLINE_BUDGET: recommended maximum inline footprint in AGENTS.md once the rule is mature.
#
# REFERENCE: exact file/section that documents the full rule, hook, and bypass/recovery path.

Raw gh create/edit wrappers | deterministic | .agents/scripts/gh-wrapper-guard.sh | hooked | 2 lines | AGENTS.md "Origin labelling" + gh-wrapper-guard.sh header | Blocks raw gh issue/pr create/edit in shell scripts; prompt keeps wrapper names only.
Signature footer provenance | deterministic | .agents/scripts/gh-signature-helper.sh + .agents/scripts/gh PATH shim + opencode quality hook | partial | 4 lines | AGENTS.md "Signature footer hallucination" | Enforcement exists for gh writes; keep inline invariant because agents compose PR/comment bodies directly.
Stat portability | deterministic | .agents/scripts/stat-portability-check.sh + .github/workflows/stat-portability-check.yml | hooked | 2 lines | reference/shell-style-guide.md "Stat portability" | AGENTS keeps the BSD/GNU trap and helper names; detail lives in reference.
Counter safety | deterministic | .github/workflows/counter-stack-check.yml + safe_grep_count in shared-constants.sh | hooked | 2 lines | reference/shell-style-guide.md "Counter Safety" | Mechanical grep -c footgun; hook/CI should enforce regressions.
Duplicate TODO task IDs | deterministic | install-pre-push-guards.sh dup-todo + pre-commit TODO gate | hooked | 1 line | reference/pre-push-guards.md | Keep completion/traceability policy inline; duplicate detection belongs to hooks.
Prompt-to-reference extraction | deterministic | .agents/scripts/progressive-load-check.sh + .agents/scripts/verify-agent-discoverability.sh | hooked | 2 lines | reference/progressive-disclosure.md "Prompt-to-Hook Migration" | This registry is validated by progressive-load-check so future deterministic rules have a plan.
Prompt injection and secret handling | security | prompt-guard-helper.sh + secretlint + safety-policy-check.sh | partial | keep inline | AGENTS.md "Security Rules" + reference/secret-handling.md | Security invariants remain inline; scanners are defense in depth.
Pre-edit worktree safety | hybrid | pre-edit-check.sh + runtime hooks/plugins | hooked | 4 lines | AGENTS.md "Pre-edit rules" + workflows/pre-edit.md | Every coding session needs the invariant; implementation detail belongs to hook docs.
Memory recall mandate | judgment | memory-helper.sh recall/store | prompt-only | keep inline | AGENTS.md "Memory recall" + reference/memory-lookup.md | The model must decide when task is non-trivial before any hook can help.
Productivity/current-state diagnosis | hybrid | worker-activity-helper.sh + dispatch-stages/headless metrics | partial | 4 lines | AGENTS.md "Productivity questions" + reference/worker-diagnostics.md | Deterministic sources exist; judgment is selecting the right window and claim wording.
