#
# Trusted issue-author allowlist (t3062)
#
# GitHub logins listed here are treated as MEMBER-equivalent for the
# worker-briefed auto-merge gate (_attempt_worker_briefed_auto_merge in
# pulse-merge-process.sh). This allows issues filed by peer runners and
# trusted operators whose GitHub authorAssociation is COLLABORATOR to
# auto-merge without requiring a per-issue cryptographic approval ceremony.
#
# Use case: multi-machine setups where a secondary runner account files issues
# that workers then resolve. The primary maintainer trusts these accounts
# implicitly but cannot make them MEMBER of the org.
#
# Format: one GitHub login per line. Blank lines and '#' comment lines ignored.
# Override path: set AIDEVOPS_TRUSTED_AUTHORS_CONF env var.
#
# Security: this allowlist relaxes ONLY the OWNER/MEMBER author_association
# gate (criterion 2 of t2449). It does NOT bypass:
#   - NMR crypto-vs-auto check (criterion 3) — auto-approved-only NMR still blocks
#   - hold-for-review label gate
#   - draft PR gate
#   - feature flag AIDEVOPS_WORKER_BRIEFED_AUTO_MERGE
#   - CI / review-bot gates
# Peer-runner issues with auto-approved-only NMR still require a crypto
# clearance via `sudo aidevops approve issue N`.
#
alex-solovyev
