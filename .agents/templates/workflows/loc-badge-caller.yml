name: Repository Metrics — generate local README data and badges

# Managed by aidevops framework.
# Upstream logic lives in: marcusquinn/aidevops/.github/workflows/loc-badge-reusable.yml
# This caller is tiny on purpose — all logic is centralised upstream.
#
# What it does: generates committed local metrics in docs/metrics/:
#   repo-metrics.json                 machine-readable app/about-page data
#   repo-metrics.md                   human-readable table
#   badges/loc.svg                    lines-of-code README badge
#   badges/languages.svg              language mix README badge
#   badges/dependencies.svg           dependency count README badge
#
# It runs weekly and after default-branch pushes, but skips if metrics are
# already fresh (24h by default). It does not run on pull_request events.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/metrics/**'
      - '.github/badges/**'
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

jobs:
  metrics:
    uses: marcusquinn/aidevops/.github/workflows/loc-badge-reusable.yml@main
    # GH#20976: `secrets: inherit` only works within the same GitHub account/org.
    # Cross-account consumers must pass secrets explicitly.
    secrets:
      SYNC_PAT: ${{ secrets.SYNC_PAT }}
    # Optional input overrides — uncomment and edit as needed:
    # with:
    #   top_n: 8
    #   skip_if_fresh_hours: 24
    #   extra_excludes: |
    #     fixtures/
    #     test-data/
