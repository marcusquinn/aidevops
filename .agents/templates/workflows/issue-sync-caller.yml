name: Issue Sync - Bi-directional TODO.md ↔ GitHub Issues

# Managed by aidevops framework.
# Upstream logic lives in: marcusquinn/aidevops/.github/workflows/issue-sync-reusable.yml
# This caller is tiny on purpose — all the logic is centralised upstream.
# Update this caller only to change the trigger filters below. For logic fixes,
# run `aidevops update` to get the latest framework version; your caller will
# pick up the change automatically (if pinned to @main) or on the next version
# bump + resync (if pinned to @v3.9.0 style).
#
# To manage this file:
#   aidevops check-workflows       # detect drift vs canonical template
#   aidevops sync-workflows        # preview resync plan
#   aidevops sync-workflows --apply
#
# Pinning options:
#   @main           ← auto-update; what this template uses by default
#   @v3.9.0         ← pin to a specific aidevops version for stability
#                     (bump via aidevops sync-workflows after upgrades)

# Permissions ceiling for downstream repos with default_workflow_permissions: read.
# Reusable workflow job-level permissions cannot exceed the caller's ceiling.
# This block sets the union of all job-level permissions used by issue-sync-reusable.yml.
permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

on:
  push:
    branches: [main]
    paths:
      - 'TODO.md'
      - 'todo/PLANS.md'
      - 'todo/tasks/**'
  pull_request:
    types: [opened, edited, closed, reopened]
  issues:
    types: [opened, edited, assigned, closed, reopened]
  workflow_dispatch:
    inputs:
      command:
        description: 'Sync command to run'
        required: true
        default: 'status'
        type: choice
        options:
          - status
          - pull
          - push
          - close
          - reconcile
          - enrich
          - event
          - audit
      subject_id:
        description: 'Immutable forge node ID (manual event only)'
        required: false
        type: string
      cursor:
        description: 'RFC3339 event cursor (manual event only)'
        required: false
        type: string
      task_id:
        description: 'Explicit trusted task ID (manual event only)'
        required: false
        type: string

jobs:
  sync:
    uses: marcusquinn/aidevops/.github/workflows/issue-sync-reusable.yml@main
    # GH#20976: `secrets: inherit` only works within the same GitHub account/org.
    # Cross-account consumers (every downstream user) receive empty values for any
    # caller-repo secret when using `secrets: inherit` against a cross-account
    # reusable workflow. Explicit pass-through is required for secrets to resolve.
    # If a new secret is added to issue-sync-reusable.yml, add it here too.
    secrets:
      SYNC_PAT: ${{ secrets.SYNC_PAT }}
    with:
      # Keep this equal to the ref on `uses:` so helper code is pinned with the reusable YAML.
      aidevops_ref: main
      command: ${{ inputs.command || '' }}
      subject_id: ${{ inputs.subject_id || '' }}
      cursor: ${{ inputs.cursor || '' }}
      task_id: ${{ inputs.task_id || '' }}
