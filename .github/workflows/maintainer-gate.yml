name: Maintainer Gate

# Blocks merge when:
# 1. PR itself has 'needs-maintainer-review' label (external contributor PRs)
# 2. PR references an issue with 'needs-maintainer-review' label
# 3. PR references an issue with no assignee
#
# Also protects labels:
# - Re-applies 'needs-maintainer-review' if removed without cryptographic approval.
# - Re-applies 'origin:worker' if removed by a non-bot actor (Job 5).
#   origin:worker is set exclusively by github-actions[bot] and must not be
#   manually applied by contributors to bypass the assignee gate.
#
# This is the hard enforcement layer. The issue-triage-gate.yml and
# pr-triage-gate.yml apply the label on creation; this workflow enforces
# it at merge time.
#
# GH#17671 post-mortem: Previously, external PRs without linked issues
# passed the gate because only linked-issue labels were checked. Now the
# gate also checks the PR's own labels, closing the bypass vector.
#
# GH#18197 post-mortem: The assignee-gate exemption was label-based
# (quality-debt), which any write-access collaborator could apply. The
# exemption is now authorship-based: only issues created by
# github-actions[bot] are exempt. origin:worker is additionally protected
# from manual addition/removal (Job 5).

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, unlabeled]
  issues:
    types: [unlabeled, labeled, assigned, unassigned]

jobs:
  # =========================================================================
  # Job 1: Block PRs that reference issues still needing maintainer review
  #         or issues with no assignee
  # =========================================================================
  check-pr:
    name: Maintainer Review & Assignee Gate
    if: >-
      github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    concurrency:
      group: maintainer-gate-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      pull-requests: write
      issues: read
      contents: read
      statuses: write

    steps:
      # Security: This job uses pull_request_target for fork PR write access.
      # It ONLY reads event metadata (PR title, body, number) — never checks
      # out or executes code from the PR head branch.
      - name: Check PR labels and linked issues for maintainer review
        id: check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAINTAINER_GATE_DEBUG: ${{ vars.MAINTAINER_GATE_DEBUG || 'false' }}
        run: |
          # ---------------------------------------------------------------
          # Check 0: Does the PR itself carry needs-maintainer-review?
          # GH#17671 post-mortem: external PRs without linked issues bypassed
          # the gate because only linked-issue labels were checked. This block
          # catches that case — the PR's own labels are the primary signal for
          # external contributor PRs. Requires cryptographic approval on the
          # PR's comments (same pattern as issue approval).
          # ---------------------------------------------------------------
          PR_LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json labels --jq '.labels[].name' 2>/dev/null || true)

          if echo "$PR_LABELS" | grep -q 'needs-maintainer-review'; then
            # Check for signed approval comment on the PR itself
            SIGNED_APPROVAL=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --jq '[.[] | select(.body | contains("<!-- aidevops-signed-approval -->"))] | length' \
              2>/dev/null || echo "0")

            if [[ "$SIGNED_APPROVAL" -gt 0 ]]; then
              echo "PR #$PR_NUMBER has needs-maintainer-review but signed approval found — continuing"
            else
              echo "BLOCKED: PR #$PR_NUMBER has needs-maintainer-review label with no signed approval"
              echo "blocked=true" >> "$GITHUB_OUTPUT"
              printf 'PR #%s has \x60needs-maintainer-review\x60 label — a maintainer must cryptographically approve it before merge.\n' "$PR_NUMBER" > /tmp/gate-reasons.txt
              echo "has_reasons=true" >> "$GITHUB_OUTPUT"
              gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
                --method POST \
                -f state=failure \
                -f context="maintainer-gate" \
                -f description="PR has needs-maintainer-review — requires cryptographic approval" \
                2>/dev/null || { sleep 5 && gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
                --method POST \
                -f state=failure \
                -f context="maintainer-gate" \
                -f description="PR has needs-maintainer-review — requires cryptographic approval"; } || {
                echo "::error::Failed to post maintainer-gate commit status after retry"
                exit 1
              }
              exit 0
            fi
          fi

          # Collect linked issue numbers from PR body
          LINKED_ISSUES=""
          if [[ -n "$PR_BODY" ]]; then
            LINKED_ISSUES=$(echo "$PR_BODY" | grep -oiE '(closes?|fixes?|resolves?)[[:space:]]*#[0-9]+' | grep -oE '[0-9]+' | sort -u | tr '\n' ' ' || true)
          fi

          # Also check PR title for task ID and find matching issue
          TASK_ID=$(echo "$PR_TITLE" | grep -oE '^t[0-9]+(\.[0-9]+)*' || true)
          TITLE_LOOKUP_FAILED=false
          if [[ -n "$TASK_ID" && -z "$LINKED_ISSUES" ]]; then
            ISSUE_SEARCH_OUTPUT=$(gh issue list --repo "$REPO" --state all --search "${TASK_ID}:" --json number,title --limit 5 2>&1) || {
              echo "::warning::Title-based issue lookup failed for task ID '$TASK_ID': $ISSUE_SEARCH_OUTPUT"
              ISSUE_SEARCH_OUTPUT=""
              TITLE_LOOKUP_FAILED=true
            }
            if [[ -n "$ISSUE_SEARCH_OUTPUT" ]]; then
              FOUND=$(echo "$ISSUE_SEARCH_OUTPUT" \
                | jq -r --arg tid "$TASK_ID" '[.[] | select(.title | test("^" + $tid + "[.:\\s]"))] | .[0].number // empty' 2>&1) || {
                echo "::error::jq parsing failed during title-based issue lookup for task ID '$TASK_ID': $FOUND"
                FOUND=""
                TITLE_LOOKUP_FAILED=true
              }
              if [[ -n "$FOUND" && "$FOUND" != "null" ]]; then
                LINKED_ISSUES="$FOUND"
              fi
            fi
          fi

          # If title-based lookup was attempted but failed, block — don't pass the gate on API errors
          if [[ -z "$LINKED_ISSUES" && "$TITLE_LOOKUP_FAILED" == "true" ]]; then
            echo "::error::Title-based issue lookup failed — cannot verify linked issues. Blocking to be safe."
            echo "blocked=true" >> "$GITHUB_OUTPUT"
            printf 'Title-based issue lookup for task ID %s failed — cannot verify linked issues.\n' "$TASK_ID" > /tmp/gate-reasons.txt
            echo "has_reasons=true" >> "$GITHUB_OUTPUT"
            # Post failure commit status so branch protection sees the result
            # Fail-closed: if status post fails after retry, fail the job to avoid
            # leaving the PR without a maintainer-gate status (GH#14277)
            gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              --method POST \
              -f state=failure \
              -f context="maintainer-gate" \
              -f description="Title-based issue lookup failed — cannot verify linked issues" \
              2>/dev/null || { sleep 5 && gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              --method POST \
              -f state=failure \
              -f context="maintainer-gate" \
              -f description="Title-based issue lookup failed — cannot verify linked issues"; } || {
              echo "::error::Failed to post maintainer-gate commit status after retry"
              exit 1
            }
            exit 0
          fi

          # ---------------------------------------------------------------
          # Check -1: origin:interactive — implied maintainer approval
          # GH#18285 post-mortem: PRs created during interactive maintainer
          # sessions carry origin:interactive. The maintainer was present and
          # directing the work — no separate cryptographic approval is needed.
          #
          # t2030: applies to ALL PRs (with or without linked issues). The
          # previous placement was nested inside `if [[ -z "$LINKED_ISSUES" ]]`,
          # which was a documented-vs-implemented mismatch — build.txt says
          # "PRs tagged origin:interactive pass the maintainer gate
          # automatically when the PR author is OWNER or MEMBER", full stop.
          # The nested placement narrowed the rule to "only PRs with no
          # linked issues", making the common maintainer-triages-external-bug
          # flow still hit the full linked-issue gate despite being the exact
          # case the rule was supposed to cover.
          #
          # Security gate: ONLY passes for OWNER or MEMBER author_association.
          # COLLABORATOR is excluded — write-access contributors must still go
          # through the normal gate. A contributor could apply origin:interactive
          # manually (labels are not protected like origin:worker), so we verify
          # the PR author is actually a maintainer via GitHub's author_association.
          # The authorship check is unchanged from the pre-t2030 version — the
          # only change is which PRs reach it.
          # ---------------------------------------------------------------
          if echo "$PR_LABELS" | grep -q 'origin:interactive'; then
            if [[ "$PR_AUTHOR_ASSOCIATION" == "OWNER" ]] || \
               [[ "$PR_AUTHOR_ASSOCIATION" == "MEMBER" ]]; then
              echo "PASS: PR #$PR_NUMBER has origin:interactive and author is maintainer ($PR_AUTHOR_ASSOCIATION) — implied approval (t2030: applies to linked-issue PRs too)"
              gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
                --method POST \
                -f state=success \
                -f context="maintainer-gate" \
                -f description="origin:interactive by maintainer ($PR_AUTHOR_ASSOCIATION) — implied approval" \
                2>/dev/null || true
              exit 0
            else
              echo "SKIP: PR #$PR_NUMBER has origin:interactive but author is $PR_AUTHOR_ASSOCIATION (not OWNER/MEMBER) — continuing normal gate checks"
            fi
          fi

          if [[ -z "$LINKED_ISSUES" ]]; then
            echo "No linked issues found — gate passes (no issues to check)"
            echo "blocked=false" >> "$GITHUB_OUTPUT"
            echo "reason=" >> "$GITHUB_OUTPUT"
            # Post success commit status so branch protection sees the result
            # Fail-closed: if status post fails after retry, fail the job (GH#14277)
            gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              --method POST \
              -f state=success \
              -f context="maintainer-gate" \
              -f description="No linked issues to check" \
              2>/dev/null || { sleep 5 && gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              --method POST \
              -f state=success \
              -f context="maintainer-gate" \
              -f description="No linked issues to check"; } || {
              echo "::error::Failed to post maintainer-gate commit status after retry"
              exit 1
            }
            exit 0
          fi

          echo "Checking linked issues: $LINKED_ISSUES"

          BLOCKED=false
          REASONS=""

          for ISSUE_NUM in $LINKED_ISSUES; do
            echo "--- Checking issue #$ISSUE_NUM ---"

            # Fetch raw issue JSON first, then parse — never silence API errors (GH#11063)
            RAW_ISSUE_DATA=$(gh api "repos/${REPO}/issues/${ISSUE_NUM}" 2>&1) || {
              echo "::error::gh api failed for issue #$ISSUE_NUM: $RAW_ISSUE_DATA"
              BLOCKED=true
              REASONS="${REASONS}Issue #${ISSUE_NUM}: API call failed — cannot verify assignee/labels.\n"
              continue
            }

            # Debug: log raw assignees and labels arrays for troubleshooting (opt-in via workflow_dispatch or re-run)
            if [[ "${MAINTAINER_GATE_DEBUG:-false}" == "true" ]]; then
              echo "DEBUG: Raw assignees for issue #$ISSUE_NUM: $(echo "$RAW_ISSUE_DATA" | jq -c '[.assignees[]?.login]')"
              echo "DEBUG: Raw labels for issue #$ISSUE_NUM: $(echo "$RAW_ISSUE_DATA" | jq -c '[.labels[]?.name]')"
            fi

            # Parse fields from raw JSON — use []? to handle empty arrays safely
            ISSUE_DATA=$(echo "$RAW_ISSUE_DATA" | jq '{labels: [.labels[]?.name], assignees: [.assignees[]?.login], state: .state, author_association: .author_association, user_login: .user.login}') || {
              echo "::error::jq parsing failed for issue #$ISSUE_NUM"
              echo "DEBUG: First 500 chars of raw response: ${RAW_ISSUE_DATA:0:500}"
              BLOCKED=true
              REASONS="${REASONS}Issue #${ISSUE_NUM}: Failed to parse API response.\n"
              continue
            }

            LABELS=$(echo "$ISSUE_DATA" | jq -r '.labels[]' 2>/dev/null || true)
            ASSIGNEES=$(echo "$ISSUE_DATA" | jq -r '.assignees[]' 2>/dev/null || true)
            STATE=$(echo "$ISSUE_DATA" | jq -r '.state' 2>/dev/null || echo "unknown")
            ISSUE_AUTHOR=$(echo "$ISSUE_DATA" | jq -r '.user_login' 2>/dev/null || echo "unknown")

            if [[ "${MAINTAINER_GATE_DEBUG:-false}" == "true" ]]; then
              echo "DEBUG: Parsed LABELS='$LABELS' ASSIGNEES='$ASSIGNEES' STATE='$STATE' ISSUE_AUTHOR='$ISSUE_AUTHOR'"
            fi

            # Skip closed issues — they've already been reviewed
            if [[ "$STATE" == "closed" ]]; then
              echo "Issue #$ISSUE_NUM is closed — skipping"
              continue
            fi

            # Check 1: needs-maintainer-review label
            if echo "$LABELS" | grep -q 'needs-maintainer-review'; then
              BLOCKED=true
              REASONS="${REASONS}Issue #${ISSUE_NUM} has \`needs-maintainer-review\` label — a maintainer must review and approve the issue before it can be worked on.\n"
              echo "BLOCKED: Issue #$ISSUE_NUM has needs-maintainer-review"
            fi

            # Check 2: no assignee
            # Exempt only when BOTH conditions hold (GH#6623, GH#18197):
            #   a) Issue was created by github-actions[bot] — immutable, cannot be spoofed
            #   b) PR author is OWNER or MEMBER (maintainer-tier only).
            #      COLLABORATOR is excluded — write-access contributors must have the
            #      issue explicitly assigned before their PR passes the gate.
            #      On personal repos there are no MEMBERs, so effectively OWNER-only.
            # Either condition alone is insufficient.
            if [[ -z "$ASSIGNEES" ]]; then
              PR_AUTHOR_IS_MAINTAINER=false
              if [[ "$PR_AUTHOR_ASSOCIATION" == "OWNER" ]] || \
                 [[ "$PR_AUTHOR_ASSOCIATION" == "MEMBER" ]]; then
                PR_AUTHOR_IS_MAINTAINER=true
              fi

              if [[ "$ISSUE_AUTHOR" == "github-actions[bot]" ]] && [[ "$PR_AUTHOR_IS_MAINTAINER" == "true" ]]; then
                echo "EXEMPT: Issue #$ISSUE_NUM created by github-actions[bot] and PR author is maintainer (OWNER/MEMBER) — assignee check skipped"
              else
                BLOCKED=true
                REASONS="${REASONS}Issue #${ISSUE_NUM} has no assignee — an issue must be assigned before work begins.\n"
                echo "BLOCKED: Issue #$ISSUE_NUM has no assignee (issue_author=$ISSUE_AUTHOR, pr_author_association=$PR_AUTHOR_ASSOCIATION)"
              fi
            fi
          done

          echo "blocked=$BLOCKED" >> "$GITHUB_OUTPUT"
          # Use a temp file for multi-line reasons
          printf '%b' "$REASONS" > /tmp/gate-reasons.txt
          echo "has_reasons=true" >> "$GITHUB_OUTPUT"

          # Post commit status so branch protection sees the result (GH#14277)
          # The check-run (job name) is separate from the commit status context.
          # Branch protection may require the "maintainer-gate" commit status,
          # which was previously only posted by the retrigger-pr-checks job on
          # issue label changes — not on PR open/sync events.
          # Fail-closed: if status post fails after retry, fail the job (GH#14277)
          if [[ "$BLOCKED" == "true" ]]; then
            DESCRIPTION=$(head -c 140 /tmp/gate-reasons.txt | tr '\n' ' ')
            gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              --method POST \
              -f state=failure \
              -f context="maintainer-gate" \
              -f description="${DESCRIPTION}" \
              2>/dev/null || { sleep 5 && gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              --method POST \
              -f state=failure \
              -f context="maintainer-gate" \
              -f description="${DESCRIPTION}"; } || {
              echo "::error::Failed to post maintainer-gate commit status after retry"
              exit 1
            }
          else
            gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              --method POST \
              -f state=success \
              -f context="maintainer-gate" \
              -f description="All linked issues pass gate checks" \
              2>/dev/null || { sleep 5 && gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              --method POST \
              -f state=success \
              -f context="maintainer-gate" \
              -f description="All linked issues pass gate checks"; } || {
              echo "::error::Failed to post maintainer-gate commit status after retry"
              exit 1
            }
          fi

      - name: Post or update gate comment
        if: steps.check.outputs.blocked == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REASONS=$(cat /tmp/gate-reasons.txt)

          BODY="<!-- maintainer-gate-check -->
          **Maintainer Gate: BLOCKED**

          This PR cannot be merged because:

          ${REASONS}
          **What to do:**
          1. A maintainer must review the linked issue(s) and approve them using the cryptographic approval command:
             \`\`\`
             sudo aidevops approve issue <issue_number>
             \`\`\`
             This requires your system password and signs the approval with a root-protected key that automation cannot forge.
          2. The issue(s) must have an assignee before work begins
          3. This check re-runs automatically when the issue is updated

          _This is an automated check. See [issue-triage-gate.yml](/.github/workflows/issue-triage-gate.yml) for the triage policy._"

          # Check if we already posted a gate comment
          EXISTING=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
            --jq '[.comments[] | select(.body | contains("maintainer-gate-check"))] | length' 2>/dev/null || echo "0")

          if [[ "$EXISTING" == "0" ]]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY" 2>/dev/null || true
          fi

      - name: Gate result
        if: steps.check.outputs.blocked == 'true'
        run: |
          echo "::error::PR is blocked by maintainer gate. See PR comment for details."
          cat /tmp/gate-reasons.txt
          exit 1

  # =========================================================================
  # Job 2: Protect labels — re-apply needs-maintainer-review if removed by
  #         a non-maintainer on an external issue
  # =========================================================================
  protect-labels:
    name: Protect Triage Labels
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'unlabeled' &&
      github.event.label.name == 'needs-maintainer-review'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      issues: write

    steps:
      - name: Re-apply label if no signed approval exists (t1894)
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ACTOR: ${{ github.actor }}
          ACTOR_ASSOCIATION: ${{ github.event.issue.author_association }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Label 'needs-maintainer-review' removed from issue #$ISSUE_NUMBER by $ACTOR"

          # Always allow the bot — the approval-helper.sh removes labels after
          # posting a signed approval comment, so this is the legitimate path.
          if [[ "$ACTOR" == "github-actions[bot]" ]] || [[ "$ACTOR" == "github-actions" ]]; then
            echo "ALLOWED: GitHub Actions bot — label removal accepted"
            exit 0
          fi

          # t1894: Check for a cryptographic signed approval comment.
          # Even admin/maintainer actors must use the approval command —
          # manual label removal alone is insufficient because it leaves
          # no auditable cryptographic proof of approval.
          SIGNED_APPROVAL=$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            --jq '[.[] | select(.body | contains("<!-- aidevops-signed-approval -->"))] | length' \
            2>/dev/null || echo "0")

          if [[ "$SIGNED_APPROVAL" -gt 0 ]]; then
            echo "ALLOWED: Signed approval comment found — label removal accepted"
            exit 0
          fi

          echo "DENIED: No signed approval found — re-applying label (actor: $ACTOR)"

          # Re-apply the label
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "needs-maintainer-review"

          # Post a comment explaining why
          EXISTING=$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            --jq "[.[] | select(.body | test(\"label-protection-notice\"))] | length" 2>/dev/null || echo "0")

          if [[ "$EXISTING" == "0" ]]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "<!-- label-protection-notice -->
          The \`needs-maintainer-review\` label was re-applied automatically.

          Removing this label requires a cryptographic approval — even for maintainers. This ensures every approval is auditable and cannot be forged by automation.

          To approve this issue, run from your terminal:
          \`\`\`
          sudo aidevops approve issue $ISSUE_NUMBER
          \`\`\`
          This signs the approval with a root-protected key and posts a verifiable comment."
          fi

  # =========================================================================
  # Job 3: Re-evaluate PR gate when a linked issue's labels or assignees change
  #         (evaluates conditions and posts final success/failure status)
  # =========================================================================
  retrigger-pr-checks:
    name: Re-evaluate PR Gate on Issue Change
    if: >-
      github.event_name == 'issues' &&
      (github.event.action == 'labeled' || github.event.action == 'unlabeled' || github.event.action == 'assigned' || github.event.action == 'unassigned')
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      pull-requests: read
      issues: read
      contents: read
      statuses: write
      actions: write  # t2018: refresh required CheckRun by re-running Job 1

    steps:
      - name: Find linked PRs and re-evaluate gate
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAINTAINER_GATE_DEBUG: ${{ vars.MAINTAINER_GATE_DEBUG || 'false' }}
        run: |
          echo "Issue #$ISSUE_NUMBER updated (labels/assignee) — checking for linked PRs"

          # Find open PRs that reference this issue via body closing keywords
          # OR via title task-ID pattern (e.g. "t1234: description" where issue
          # title starts with the same task ID). Both linking methods are used
          # by check-pr, so retrigger must discover both. (GH#14413)
          OPEN_PRS=$(gh pr list --repo "$REPO" --state open --json number,body,title --limit 50 \
            | jq -r --arg num "$ISSUE_NUMBER" \
              '[.[] | select(
                (.body // "" | test("(closes?|fixes?|resolves?)\\s*#" + $num + "\\b"; "i"))
                or (.title // "" | test("^(GH)?#?" + $num + "[.:\\s]"))
              )] | .[].number' \
            2>/dev/null || true)

          # If body/title match missed, also try task-ID reverse lookup:
          # find the issue's task ID from its title, then find PRs whose title
          # starts with that task ID.
          if [[ -z "$OPEN_PRS" ]]; then
            ISSUE_TITLE=$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}" --jq '.title' 2>/dev/null || true)
            ISSUE_TASK_ID=$(echo "$ISSUE_TITLE" | grep -oE '^t[0-9]+(\.[0-9]+)*' || true)
            if [[ -n "$ISSUE_TASK_ID" ]]; then
              OPEN_PRS=$(gh pr list --repo "$REPO" --state open --json number,title --limit 50 \
                | jq -r --arg tid "$ISSUE_TASK_ID" \
                  '[.[] | select(.title | test("^" + $tid + "[.:\\s]"))] | .[].number' \
                2>/dev/null || true)
            fi
          fi

          if [[ -z "$OPEN_PRS" ]]; then
            echo "No open PRs reference issue #$ISSUE_NUMBER"
            exit 0
          fi

          echo "Found PRs referencing issue #$ISSUE_NUMBER: $OPEN_PRS"

          for PR_NUM in $OPEN_PRS; do
            echo "=== Evaluating gate for PR #$PR_NUM ==="

            # Reset per-PR state so failures don't leak across iterations (GH#14413)
            TITLE_LOOKUP_FAILED=false

            HEAD_SHA=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefOid --jq '.headRefOid' 2>/dev/null || true)
            if [[ -z "$HEAD_SHA" ]]; then
              echo "::warning::Could not get HEAD SHA for PR #$PR_NUM — skipping"
              continue
            fi

            # Post pending status while we evaluate
            gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              --method POST \
              -f state=pending \
              -f context="maintainer-gate" \
              -f description="Re-evaluating after issue #${ISSUE_NUMBER} update" \
              2>/dev/null || true

            # Get PR body and labels to find ALL linked issues (not just the triggering one)
            PR_BODY=$(gh pr view "$PR_NUM" --repo "$REPO" --json body --jq '.body' 2>/dev/null || true)
            RETRIGGER_PR_LABELS=$(gh pr view "$PR_NUM" --repo "$REPO" --json labels --jq '.labels[].name' 2>/dev/null || true)
            PR_TITLE=$(gh pr view "$PR_NUM" --repo "$REPO" --json title --jq '.title' 2>/dev/null || true)

            LINKED_ISSUES=""
            if [[ -n "$PR_BODY" ]]; then
              LINKED_ISSUES=$(echo "$PR_BODY" | grep -oiE '(closes?|fixes?|resolves?)[[:space:]]*#[0-9]+' | grep -oE '[0-9]+' | sort -u | tr '\n' ' ' || true)
            fi

            # Also check PR title for task ID and find matching issue
            TASK_ID=$(echo "$PR_TITLE" | grep -oE '^t[0-9]+(\.[0-9]+)*' || true)
            if [[ -n "$TASK_ID" && -z "$LINKED_ISSUES" ]]; then
              ISSUE_SEARCH_OUTPUT=$(gh issue list --repo "$REPO" --state all --search "${TASK_ID}:" --json number,title --limit 5 2>&1) || {
                echo "::warning::Title-based issue lookup failed for task ID '$TASK_ID': $ISSUE_SEARCH_OUTPUT"
                ISSUE_SEARCH_OUTPUT=""
                TITLE_LOOKUP_FAILED=true
              }
              if [[ -n "$ISSUE_SEARCH_OUTPUT" ]]; then
                FOUND=$(echo "$ISSUE_SEARCH_OUTPUT" \
                  | jq -r --arg tid "$TASK_ID" '[.[] | select(.title | test("^" + $tid + "[.:\\s]"))] | .[0].number // empty' 2>&1) || {
                  echo "::error::jq parsing failed during title-based issue lookup for task ID '$TASK_ID': $FOUND"
                  FOUND=""
                  TITLE_LOOKUP_FAILED=true
                }
                if [[ -n "$FOUND" && "$FOUND" != "null" ]]; then
                  LINKED_ISSUES="$FOUND"
                fi
              fi
            fi

            # If title-based lookup was attempted but failed, block — don't pass the gate on API errors
            if [[ -z "$LINKED_ISSUES" && "$TITLE_LOOKUP_FAILED" == "true" ]]; then
              echo "::error::Title-based issue lookup failed for PR #$PR_NUM — blocking to be safe"
              gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
                --method POST \
                -f state=failure \
                -f context="maintainer-gate" \
                -f description="Title-based issue lookup failed — cannot verify linked issues" \
                2>/dev/null || echo "::warning::Could not post failure status on PR #$PR_NUM"
              continue
            fi

            if [[ -z "$LINKED_ISSUES" ]]; then
              # External-contributor PRs must link an issue (same rule as Job 1)
              if echo "$RETRIGGER_PR_LABELS" | grep -q 'external-contributor'; then
                echo "BLOCKED: external-contributor PR #$PR_NUM has no linked issue"
                gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
                  --method POST \
                  -f state=failure \
                  -f context="maintainer-gate" \
                  -f description="External PR has no linked issue — requires Closes #NNN in body" \
                  2>/dev/null || echo "::warning::Could not post failure status on PR #$PR_NUM"
                continue
              fi

              echo "No linked issues found for PR #$PR_NUM — gate passes"
              gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
                --method POST \
                -f state=success \
                -f context="maintainer-gate" \
                -f description="No linked issues to check" \
                2>/dev/null || echo "::warning::Could not post status on PR #$PR_NUM"
              continue
            fi

            echo "Checking linked issues for PR #$PR_NUM: $LINKED_ISSUES"

            # Evaluate gate conditions on all linked issues
            BLOCKED=false
            DESCRIPTION="All linked issues pass gate checks"

            for ISSUE_NUM in $LINKED_ISSUES; do
              echo "--- Checking issue #$ISSUE_NUM ---"

              # Fetch raw issue JSON first, then parse — never silence API errors (GH#11063)
              RAW_ISSUE_DATA=$(gh api "repos/${REPO}/issues/${ISSUE_NUM}" 2>&1) || {
                echo "::error::gh api failed for issue #$ISSUE_NUM: $RAW_ISSUE_DATA"
                BLOCKED=true
                DESCRIPTION="Issue #${ISSUE_NUM}: API call failed"
                continue
              }

              # Debug: log raw assignees and labels arrays for troubleshooting (opt-in)
              if [[ "${MAINTAINER_GATE_DEBUG:-false}" == "true" ]]; then
                echo "DEBUG: Raw assignees for issue #$ISSUE_NUM: $(echo "$RAW_ISSUE_DATA" | jq -c '[.assignees[]?.login]')"
                echo "DEBUG: Raw labels for issue #$ISSUE_NUM: $(echo "$RAW_ISSUE_DATA" | jq -c '[.labels[]?.name]')"
              fi

              # Parse fields from raw JSON
              ISSUE_DATA=$(echo "$RAW_ISSUE_DATA" | jq '{labels: [.labels[]?.name], assignees: [.assignees[]?.login], state: .state, user_login: .user.login}') || {
                echo "::error::jq parsing failed for issue #$ISSUE_NUM"
                echo "DEBUG: First 500 chars of raw response: ${RAW_ISSUE_DATA:0:500}"
                BLOCKED=true
                DESCRIPTION="Issue #${ISSUE_NUM}: Failed to parse API response"
                continue
              }

              LABELS=$(echo "$ISSUE_DATA" | jq -r '.labels[]' 2>/dev/null || true)
              ASSIGNEES=$(echo "$ISSUE_DATA" | jq -r '.assignees[]' 2>/dev/null || true)
              STATE=$(echo "$ISSUE_DATA" | jq -r '.state' 2>/dev/null || echo "unknown")
              ISSUE_AUTHOR=$(echo "$ISSUE_DATA" | jq -r '.user_login' 2>/dev/null || echo "unknown")

              if [[ "${MAINTAINER_GATE_DEBUG:-false}" == "true" ]]; then
                echo "DEBUG: Parsed LABELS='$LABELS' ASSIGNEES='$ASSIGNEES' STATE='$STATE' ISSUE_AUTHOR='$ISSUE_AUTHOR'"
              fi

              # Skip closed issues — they've already been reviewed
              if [[ "$STATE" == "closed" ]]; then
                echo "Issue #$ISSUE_NUM is closed — skipping"
                continue
              fi

              # Check 1: needs-maintainer-review label
              if echo "$LABELS" | grep -q 'needs-maintainer-review'; then
                BLOCKED=true
                DESCRIPTION="Issue #${ISSUE_NUM} has needs-maintainer-review label"
                echo "BLOCKED: Issue #$ISSUE_NUM has needs-maintainer-review"
              fi

              # Check 2: no assignee
              # Exempt only when BOTH conditions hold (GH#6623, GH#18197):
              #   a) Issue was created by github-actions[bot]
              #   b) PR author is OWNER or MEMBER (maintainer-tier only, not COLLABORATOR)
              if [[ -z "$ASSIGNEES" ]]; then
                PR_AUTHOR_ASSOC=$(gh pr view "$PR_NUM" --repo "$REPO" \
                  --json authorAssociation --jq '.authorAssociation' 2>/dev/null || echo "NONE")
                PR_AUTHOR_IS_MAINTAINER=false
                if [[ "$PR_AUTHOR_ASSOC" == "OWNER" ]] || \
                   [[ "$PR_AUTHOR_ASSOC" == "MEMBER" ]]; then
                  PR_AUTHOR_IS_MAINTAINER=true
                fi

                if [[ "$ISSUE_AUTHOR" == "github-actions[bot]" ]] && [[ "$PR_AUTHOR_IS_MAINTAINER" == "true" ]]; then
                  echo "EXEMPT: Issue #$ISSUE_NUM created by github-actions[bot] and PR author is maintainer (OWNER/MEMBER) — assignee check skipped"
                else
                  BLOCKED=true
                  DESCRIPTION="Issue #${ISSUE_NUM} has no assignee"
                  echo "BLOCKED: Issue #$ISSUE_NUM has no assignee (issue_author=$ISSUE_AUTHOR, pr_author_assoc=$PR_AUTHOR_ASSOC)"
                fi
              fi
          done

            # Post final status
            if [[ "$BLOCKED" == "true" ]]; then
              echo "Gate BLOCKED for PR #$PR_NUM: $DESCRIPTION"
              gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
                --method POST \
                -f state=failure \
                -f context="maintainer-gate" \
                -f description="$DESCRIPTION" \
                2>/dev/null || echo "::warning::Could not post failure status on PR #$PR_NUM"
            else
              echo "Gate PASSED for PR #$PR_NUM"
              gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
                --method POST \
                -f state=success \
                -f context="maintainer-gate" \
                -f description="$DESCRIPTION" \
                2>/dev/null || echo "::warning::Could not post success status on PR #$PR_NUM"
            fi

            # -----------------------------------------------------------------
            # t2018: refresh the REQUIRED CheckRun by re-running Job 1.
            #
            # The `maintainer-gate` status context posted above is NOT the
            # required check — branch protection requires the CheckRun
            # "Maintainer Review & Assignee Gate" produced by Job 1's job
            # name. Job 1 only runs on `pull_request_target` events, so when
            # an approval happens AFTER the PR is opened the required
            # CheckRun stays stuck on its stale PR-creation-time failure
            # until someone manually re-runs the workflow.
            #
            # Fix: find the latest completed `check-pr` workflow run for
            # this PR's HEAD SHA and re-run its failed jobs if its conclusion
            # was not `success`. The re-run creates a new CheckRun with the
            # same required name, and branch protection uses the latest one.
            #
            # Job 1 is idempotent — it reads issue state via gh api at
            # runtime rather than caching — so re-running reflects the
            # post-approval state automatically.
            # -----------------------------------------------------------------
            RUN_LOOKUP=$(gh api \
              "repos/${REPO}/actions/workflows/maintainer-gate.yml/runs?head_sha=${HEAD_SHA}&event=pull_request_target&per_page=1" \
              --jq '.workflow_runs[0] | [.id, .conclusion] | @tsv' \
              2>/dev/null || true)

            if [[ -z "$RUN_LOOKUP" ]]; then
              echo "No prior maintainer-gate run found for PR #$PR_NUM at $HEAD_SHA — skipping CheckRun refresh"
            else
              RUN_ID=$(printf '%s' "$RUN_LOOKUP" | cut -f1)
              RUN_CONCLUSION=$(printf '%s' "$RUN_LOOKUP" | cut -f2)
              if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
                echo "::warning::Could not parse run id from Job 1 lookup for PR #$PR_NUM"
              elif [[ "$RUN_CONCLUSION" == "success" ]]; then
                echo "Latest Job 1 run $RUN_ID already succeeded — no refresh needed for PR #$PR_NUM"
              else
                echo "Refreshing required CheckRun: re-running Job 1 (run_id=$RUN_ID, prior=$RUN_CONCLUSION) for PR #$PR_NUM"
                gh api \
                  "repos/${REPO}/actions/runs/${RUN_ID}/rerun-failed-jobs" \
                  --method POST \
                  2>/dev/null \
                  || echo "::warning::Failed to re-run Job 1 for PR #$PR_NUM — required CheckRun may remain stale until the next pull_request_target event"
              fi
            fi
          done

  # =========================================================================
  # Job 4: Protect PR labels — re-apply needs-maintainer-review if removed
  #         from an external-contributor PR without cryptographic approval.
  #         Mirrors the issue label protection (Job 2) for PRs.
  #
  # GH#17671 post-mortem: the issue protection existed but PRs had no
  # equivalent. An actor could remove the NMR label from a PR and the
  # maintainer-gate Check 0 would no longer block.
  # =========================================================================
  protect-pr-labels:
    name: Protect PR Triage Labels
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'unlabeled' &&
      github.event.label.name == 'needs-maintainer-review'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: write

    steps:
      - name: Re-apply label if no signed approval exists
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Label 'needs-maintainer-review' removed from PR #$PR_NUMBER by $ACTOR"

          # Always allow the bot — the approval-helper.sh removes labels after
          # posting a signed approval comment, so this is the legitimate path.
          if [[ "$ACTOR" == "github-actions[bot]" ]] || [[ "$ACTOR" == "github-actions" ]]; then
            echo "ALLOWED: GitHub Actions bot — label removal accepted"
            exit 0
          fi

          # Only protect PRs that were labelled external-contributor.
          # Internal PRs (from collaborators) should never have had NMR in
          # the first place — don't fight a manual correction on those.
          PR_LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json labels --jq '.labels[].name' 2>/dev/null || true)

          if ! echo "$PR_LABELS" | grep -q 'external-contributor'; then
            echo "ALLOWED: PR #$PR_NUMBER is not an external-contributor PR — label removal accepted"
            exit 0
          fi

          # Check for a cryptographic signed approval comment on the PR.
          # PRs use the same issues API endpoint for comments.
          SIGNED_APPROVAL=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | contains("<!-- aidevops-signed-approval -->"))] | length' \
            2>/dev/null || echo "0")

          if [[ "$SIGNED_APPROVAL" -gt 0 ]]; then
            echo "ALLOWED: Signed approval comment found — label removal accepted"
            exit 0
          fi

          echo "DENIED: No signed approval found — re-applying label (actor: $ACTOR)"

          # Re-apply the label
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "needs-maintainer-review"

          # Post a comment explaining why (only once)
          EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | test(\"pr-label-protection-notice\"))] | length" 2>/dev/null || echo "0")

          if [[ "$EXISTING" == "0" ]]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "<!-- pr-label-protection-notice -->
          The \`needs-maintainer-review\` label was re-applied automatically.

          Removing this label requires a cryptographic approval — even for maintainers. This ensures every approval is auditable and cannot be forged by automation.

          To approve this PR, run from your terminal:
          \`\`\`
          sudo aidevops approve pr $PR_NUMBER
          \`\`\`
          This signs the approval with a root-protected key and posts a verifiable comment."
          fi

  # =========================================================================
  # Job 5: Protect origin:worker label — re-apply if added or removed by a
  #         non-bot actor. This label is set exclusively by github-actions[bot]
  #         to mark machine-generated issues. Manual manipulation would allow
  #         contributors to bypass the assignee gate (GH#18197).
  # =========================================================================
  protect-origin-worker-label:
    name: Protect origin:worker Label
    if: >-
      github.event_name == 'issues' &&
      (github.event.action == 'labeled' || github.event.action == 'unlabeled') &&
      github.event.label.name == 'origin:worker'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      issues: write

    steps:
      - name: Enforce bot-only origin:worker label (GH#18197)
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ACTION: ${{ github.event.action }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "origin:worker label $ACTION on issue #$ISSUE_NUMBER by $ACTOR"

          # Only github-actions[bot] may add or remove this label.
          if [[ "$ACTOR" == "github-actions[bot]" ]] || [[ "$ACTOR" == "github-actions" ]]; then
            echo "ALLOWED: GitHub Actions bot — origin:worker label change accepted"
            exit 0
          fi

          echo "DENIED: $ACTOR is not the bot — reversing origin:worker label $ACTION"

          if [[ "$ACTION" == "labeled" ]]; then
            # Non-bot added the label — remove it
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label "origin:worker"
            NOTICE="The \`origin:worker\` label was removed automatically. This label is reserved for issues created by the automation pipeline and cannot be applied manually."
          else
            # Non-bot removed the label — re-apply it only if the issue was bot-authored
            ISSUE_AUTHOR=$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}" --jq '.user.login' 2>/dev/null || echo "unknown")
            if [[ "$ISSUE_AUTHOR" == "github-actions[bot]" ]]; then
              gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "origin:worker"
              NOTICE="The \`origin:worker\` label was re-applied automatically. This issue was created by the automation pipeline and its provenance label cannot be removed manually."
            else
              echo "Issue #$ISSUE_NUMBER was not bot-authored — skipping re-apply"
              exit 0
            fi
          fi

          # Post a one-time notice
          EXISTING=$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            --jq "[.[] | select(.body | test(\"origin-worker-protection-notice\"))] | length" 2>/dev/null || echo "0")

          if [[ "$EXISTING" == "0" ]]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "<!-- origin-worker-protection-notice -->
          ${NOTICE}"
          fi
