name: Maintainer Gate

# Thin self-caller for the reusable workflow at .github/workflows/maintainer-gate-reusable.yml.
# aidevops eats its own dogfood — it calls the same reusable workflow that
# downstream repos call via `uses: marcusquinn/aidevops/.github/workflows/maintainer-gate-reusable.yml@main`.
# The only difference is the relative-path `uses:` here vs the absolute path there.
#
# t2937/GH#21154: converted from inline logic to reusable-workflow caller pattern.
# The full gate logic now lives in maintainer-gate-reusable.yml (single source of truth).
# Downstream repos install maintainer-gate-caller.yml via `aidevops sync-workflows --apply`.
#
# Downstream caller template: .agents/templates/workflows/maintainer-gate-caller.yml
# Architecture: .agents/reference/reusable-workflows.md
# Security postmortem: .agents/reference/incident-gh17671-supply-chain.md

# Permissions ceiling for downstream repos with default_workflow_permissions: read.
# Reusable workflow job-level permissions cannot exceed the caller's ceiling.
# This block sets the union of all job-level permissions used by maintainer-gate-reusable.yml.
permissions:
  pull-requests: write
  issues: write
  contents: read
  statuses: write
  actions: write

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
  issues:
    types: [unlabeled, labeled, assigned, unassigned]

jobs:
  gate:
    uses: ./.github/workflows/maintainer-gate-reusable.yml
    secrets: inherit
