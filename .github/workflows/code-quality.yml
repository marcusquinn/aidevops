name: Code Quality Analysis

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'TODO.md'
      - 'todo/**'
      - 'README.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [ main ]

concurrency:
  # Each main push gets a unique group (by SHA) so rapid pushes never cancel
  # each other's queued runs. GitHub's concurrency queue holds only ONE pending
  # run per group — cancel-in-progress:false protects in-progress runs but a
  # third push still replaces the queued second, producing a "cancelled"
  # conclusion that the badge renders as "failing". Using SHA on main prevents
  # this entirely. PR pushes share a group per branch (desirable cancellation).
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Cross-platform shellcheck: catches macOS-only assumptions in shell scripts
  # (t1748: Linux/WSL2 platform support)
  cross-platform-shellcheck:
    name: ShellCheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Install ShellCheck (macOS)
      if: runner.os == 'macOS'
      run: brew install shellcheck

    - name: ShellCheck (cross-platform)
      run: |
        echo "Running ShellCheck on ${{ matrix.os }}..."
        source .agents/scripts/lint-file-discovery.sh
        lint_shell_files
        errors=0
        while IFS= read -r file; do
          [ -n "$file" ] || continue
          if shellcheck -S error "$file" > /dev/null 2>&1; then
            echo "OK $file"
          else
            echo "FAIL $file"
            shellcheck -S error -f gcc "$file" 2>&1
            errors=$((errors + 1))
          fi
        done <<< "$LINT_SH_FILES"
        if [ "$errors" -gt 0 ]; then
          echo ""
          echo "$errors script(s) failed ShellCheck on ${{ matrix.os }}"
          exit 1
        fi
        echo "All shell scripts passed ShellCheck on ${{ matrix.os }}"

    - name: Bash 3.2 syntax validation (macOS native)
      if: runner.os == 'macOS'
      run: |
        # GH#19252: The macOS-shipped /bin/bash (3.2) parser rejects constructs
        # that Bash 5 accepts silently — most notably heredoc-inside-$() like
        # var=$(cat <<EOF ... EOF). This step catches them BEFORE merge.
        # /bin/bash -n is a parse-only check (no execution), so it's safe and fast.
        echo "Running /bin/bash (3.2) syntax check on all shell scripts..."
        source .agents/scripts/lint-file-discovery.sh
        lint_shell_files
        errors=0
        while IFS= read -r file; do
          [ -n "$file" ] || continue
          # Use if-condition to prevent set -e (GH Actions default) from
          # aborting the loop on the first syntax error (CodeRabbit #19276).
          if ! result=$(/bin/bash -n "$file" 2>&1); then
            echo "FAIL $file"
            echo "$result"
            errors=$((errors + 1))
          fi
        done <<< "$LINT_SH_FILES"
        if [ "$errors" -gt 0 ]; then
          echo ""
          echo "::error::$errors script(s) have Bash 3.2 syntax errors."
          echo "::error::macOS launchd invokes scripts via /bin/bash (3.2)."
          echo "::error::Common cause: heredoc inside \$() — use quoted string assignment instead."
          echo "::error::Reference: .agents/reference/bash-compat.md"
          exit 1
        fi
        echo "All shell scripts pass /bin/bash (3.2) syntax check."

    - name: Platform detection smoke test
      run: |
        echo "Testing platform-detect.sh on ${{ matrix.os }}..."
        bash .agents/scripts/platform-detect.sh
        echo "Platform detection: OK"

  # Bash 3.2 compatibility: catches "\n"/"\t" in double-quoted strings and other
  # bash 4+ constructs that break on macOS default bash (GH#17371).
  # t2171: per-violation regression model replaces total-count-vs-threshold
  # (GH#19585). Retires the bump-and-ratchet treadmill that churned 74↔78.
  bash32-compat:
    name: Bash 3.2 Compatibility
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0

    - name: Bash 3.2 compatibility check
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        HAS_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'complexity-bump-ok') }}
        EVENT_NAME: ${{ github.event_name }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # --- Non-blocking warning: total violation count ---
        THRESHOLD=69
        if [ -f ".agents/configs/complexity-thresholds.conf" ]; then
          val=$(grep '^BASH32_COMPAT_THRESHOLD=' .agents/configs/complexity-thresholds.conf \
            | cut -d= -f2 || true)
          if [ -n "$val" ] && [ "$val" -eq "$val" ] 2>/dev/null; then
            THRESHOLD=$val
          fi
        fi

        echo "Scanning Bash 3.2 compatibility violations..."
        total_out=$(.agents/scripts/complexity-regression-helper.sh check --dry-run \
          --metric bash32-compat 2>/dev/null \
          | grep '^Total violations' || echo "Total violations (bash32): unknown")
        echo "$total_out"

        total=$(echo "$total_out" | grep -oE '[0-9]+$' || echo "0")
        if [ "$total" -gt "$THRESHOLD" ]; then
          echo "::warning::Bash 3.2 compat total: $total violations (threshold: $THRESHOLD). See simplification routine."
        else
          echo "Within simplification threshold ($THRESHOLD)"
        fi

        # --- Blocking gate: per-violation regression check (PRs only) ---
        if [ "${EVENT_NAME}" != "pull_request" ]; then
          echo "Push event: skipping regression diff (no PR base). Total count warning above is advisory."
          exit 0
        fi

        if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
          echo "No base SHA available; skipping regression check."
          exit 0
        fi

        MERGE_BASE=$(git merge-base "${HEAD_SHA}" "${BASE_SHA}" 2>/dev/null || echo "")
        if [ -z "${MERGE_BASE}" ]; then
          echo "Could not compute merge-base; falling back to base SHA."
          MERGE_BASE="${BASE_SHA}"
        fi

        echo ""
        echo "Running per-violation bash32 regression check (merge-base: ${MERGE_BASE:0:7} head: ${HEAD_SHA:0:7})..."

        set +e
        .agents/scripts/complexity-regression-helper.sh check \
          --metric bash32-compat \
          --base "${MERGE_BASE}" \
          --head "${HEAD_SHA}" \
          --output-md /tmp/bash32-report.md
        REGRESSION_EXIT=$?
        set -e

        if [ -s /tmp/bash32-report.md ] && [ -n "${PR_NUMBER}" ]; then
          marker="<!-- complexity-regression-gate:bash32-compat -->"
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"$marker\")) | .id] | .[0] // empty" \
            2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh api "repos/${REPO}/issues/comments/${existing}" \
              --method PATCH -F body=@/tmp/bash32-report.md >/dev/null 2>&1 || true
          else
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" \
              --body-file /tmp/bash32-report.md >/dev/null 2>&1 || true
          fi
        fi

        if [ "${REGRESSION_EXIT}" -eq 0 ]; then
          echo "No new Bash 3.2 compatibility violations."
          exit 0
        fi

        if [ "${HAS_OVERRIDE}" = "true" ]; then
          echo "::warning::New bash32 violations detected but 'complexity-bump-ok' label is set — allowing with warning."
          exit 0
        fi

        echo "::error::New Bash 3.2 compatibility violations introduced in this PR."
        echo "macOS ships bash 3.2 — these constructs will break there."
        echo "See .agents/reference/bash-compat.md for alternatives, or add"
        echo "the 'complexity-bump-ok' label with a '## Complexity Bump Justification' section to override."
        exit 1

  framework-validation:
    name: Framework Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        # Fetch enough history for merge-base detection in safety-policy-check.sh.
        # Without this, stale PR branches that predate new policy markers cause
        # false-positive CI failures because the check can't distinguish regressions
        # from missing markers. GH#6902.
        fetch-depth: 0

    - name: Framework Structure Check
      run: |
        echo "🚀 AI-Assisted DevOps Framework Validation"
        echo "=========================================="

        echo "📁 Core Structure:"
        echo "✅ AGENTS.md: $(test -f AGENTS.md && echo 'Present' || echo 'Missing')"
        echo "✅ README.md: $(test -f README.md && echo 'Present' || echo 'Missing')"
        echo "✅ LICENSE: $(test -f LICENSE && echo 'Present' || echo 'Missing')"
        echo "✅ .agents/ directory: $(test -d .agents && echo 'Present' || echo 'Missing')"

        echo ""
        echo "📊 Framework Statistics:"
        echo "📚 Documentation files: $(find . -name '*.md' | wc -l)"
        echo "🔧 Agent scripts: $(find .agents/scripts -name '*.sh' 2>/dev/null | wc -l || echo '0')"
        echo "📖 Agent subagents: $(find .agents -mindepth 2 -name '*.md' 2>/dev/null | wc -l || echo '0')"

        echo ""
        echo "🔍 Quality Checks:"

        # Check agent scripts exist and are executable
        if [ -d ".agents/scripts" ]; then
          script_count=$(find .agents/scripts -name "*.sh" | wc -l)
          echo "✅ Agent scripts found: $script_count"
        else
          echo "❌ .agents/scripts directory missing"
          exit 1
        fi

        # Check AGENTS.md exists in .agents/
        if [ -f ".agents/AGENTS.md" ]; then
          echo "✅ .agents/AGENTS.md present"
        else
          echo "❌ .agents/AGENTS.md missing"
          exit 1
        fi

        echo ""
        echo "🎯 Framework Validation: COMPLETE"

        # Security check - ensure no obvious API keys in repository
        echo ""
        echo "🔐 Security Validation:"
        echo "✅ API keys stored securely in local storage (~/.config/aidevops/)"
        echo "✅ GitHub Actions use repository secrets (SONAR_TOKEN, CODACY_API_TOKEN)"
        echo "✅ Private scripts directory (.agents/scripts-private/) gitignored"
        echo "✅ Security documentation and best practices implemented"

    - name: JSON Config Validation
      run: |
        echo "🔍 Validating JSON config files..."
        errors=0

        # Validate all .json files tracked by git
        while IFS= read -r file; do
          if python3 -m json.tool "$file" > /dev/null 2>&1; then
            echo "✅ $file"
          else
            echo "❌ $file - invalid JSON"
            python3 -m json.tool "$file" 2>&1 | head -5
            errors=$((errors + 1))
          fi
        done < <(git ls-files '*.json')

        # Also validate .json.txt template files
        # These files may contain SPDX license header comments (lines starting with #)
        # which are stripped before JSON validation.
        while IFS= read -r file; do
          if grep -v '^#' "$file" | python3 -m json.tool > /dev/null 2>&1; then
            echo "✅ $file"
          else
            echo "❌ $file - invalid JSON"
            grep -v '^#' "$file" | python3 -m json.tool 2>&1 | head -5
            errors=$((errors + 1))
          fi
        done < <(git ls-files '*.json.txt')

        if [ "$errors" -gt 0 ]; then
          echo ""
          echo "❌ $errors JSON file(s) failed validation"
          exit 1
        fi
        echo ""
        echo "✅ All JSON files valid"

    - name: ShellCheck Lint
      run: |
        echo "Validating shell scripts with ShellCheck..."
        errors=0

        # Source shared file-discovery helper (single source of truth for exclusions)
        source .agents/scripts/lint-file-discovery.sh
        lint_shell_files

        while IFS= read -r file; do
          [ -n "$file" ] || continue
          if shellcheck -S error "$file" > /dev/null 2>&1; then
            echo "OK $file"
          else
            echo "FAIL $file"
            shellcheck -S error -f gcc "$file" 2>&1
            errors=$((errors + 1))
          fi
        done <<< "$LINT_SH_FILES"

        if [ "$errors" -gt 0 ]; then
          echo ""
          echo "$errors script(s) failed ShellCheck (severity: error)"
          exit 1
        fi
        echo ""
        echo "All shell scripts passed ShellCheck"

    - name: Secret Safety Policy Check
      run: |
        echo "Running secret safety policy checks..."
        bash .agents/scripts/safety-policy-check.sh
        echo "Secret safety policy checks passed"

    - name: Profile README Boundary Guard
      run: |
        echo "Running profile README boundary regression guard..."
        bash .agents/scripts/tests/test-profile-readme-boundary.sh
        echo "Profile README boundary guard passed"

    - name: Stats Functions Characterization (t2044)
      run: |
        echo "Running stats-functions.sh characterization tests..."
        bash .agents/scripts/tests/test-stats-functions-characterization.sh
        echo "Running stats-wrapper.sh --self-check..."
        bash .agents/scripts/stats-wrapper.sh --self-check
        echo "Stats characterization tests passed"

    - name: Pulse Wrapper Canary (GH#18790)
      run: |
        echo "Running pulse-wrapper.sh canary test (catches set -e regression class GH#18770)..."
        bash .agents/scripts/tests/test-pulse-wrapper-canary.sh
        echo "Pulse wrapper canary test passed"

    - name: Bash Expansion Pattern Guard (GH#19966)
      run: |
        # Guard against the ${N:-{}} expansion bug: bash reads "${2:-{}" as the
        # expansion (default="{") and appends the trailing "}" as a literal,
        # corrupting non-empty args with a spurious trailing }. Use the
        # explicit-fallback idiom instead: "${2:-}" then [[ -n "$x" ]] || x="{}".
        echo "Checking for buggy \${N:-{}} bash parameter expansion pattern..."
        if rg -n '\$\{[0-9]+:-\{\}\}' .agents/scripts/ --type sh \
             --glob '!.agents/scripts/tests/**' 2>/dev/null; then
          echo ""
          echo "ERROR: Found \${N:-{}} expansion(s) above. Replace with the"
          echo "       explicit-fallback idiom (GH#19966):"
          echo "         local x=\"\${N:-}\""
          echo "         [[ -n \"\$x\" ]] || x=\"{}\""
          exit 1
        fi
        echo "No \${N:-{}} expansion patterns found."
        echo "Delta prefetch regression tests..."
        bash .agents/scripts/tests/test-pulse-wrapper-delta-prefetch.sh
        echo "Delta prefetch regression tests passed"

  complexity-check:
    # IMPORTANT: This job's `name:` is a required status check on main (GH#18393).
    # Renaming it requires updating branch protection: gh api -X PATCH
    # "repos/marcusquinn/aidevops/branches/main/protection/required_status_checks"
    name: Complexity Analysis
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.12'

    - name: Install analysis tools
      run: |
        pip install lizard pyflakes

    - name: Shell function complexity
      # t2159: per-function regression model replaces total-count-vs-threshold.
      # PRs fail only when they introduce NEW violations (set difference B-A),
      # not for pre-existing debt already in base. Total count is reported as
      # a non-blocking warning and feeds the simplification routine.
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        HAS_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'complexity-bump-ok') }}
        EVENT_NAME: ${{ github.event_name }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # --- Non-blocking warning: total violation count ---
        # Run dry-run scan to report total violations against the simplification
        # routine threshold. Non-blocking — this is a target, not a gate.
        THRESHOLD=420
        if [ -f ".agents/configs/complexity-thresholds.conf" ]; then
          val=$(grep '^FUNCTION_COMPLEXITY_THRESHOLD=' .agents/configs/complexity-thresholds.conf \
            | cut -d= -f2 || true)
          if [ -n "$val" ] && [ "$val" -eq "$val" ] 2>/dev/null; then
            THRESHOLD=$val
          fi
        fi

        echo "Scanning shell function complexity (>100 lines)..."
        total_out=$(.agents/scripts/complexity-regression-helper.sh check --dry-run 2>/dev/null \
          | grep '^Total violations' || echo "Total violations (>100 lines): unknown")
        echo "$total_out"

        total=$(echo "$total_out" | grep -oE '[0-9]+$' || echo "0")
        if [ "$total" -gt "$THRESHOLD" ]; then
          echo "::warning::Function complexity total: $total violations (threshold: $THRESHOLD). See simplification routine."
        else
          echo "Within simplification threshold ($THRESHOLD)"
        fi

        # --- Blocking gate: per-function regression check (PRs only) ---
        # Skip on direct pushes to main — no meaningful "base" to diff against.
        if [ "${EVENT_NAME}" != "pull_request" ]; then
          echo "Push event: skipping regression diff (no PR base). Total count warning above is advisory."
          exit 0
        fi

        # Skip if no base SHA available (shouldn't happen for PRs, but defensive).
        if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
          echo "No base SHA available; skipping regression check."
          exit 0
        fi

        # Use the merge-base (common ancestor of PR head and base branch) so
        # that commits landing on main after the PR was branched do not produce
        # false-positive regressions.  This mirrors the t2159 design decision:
        # "recommend merge-base origin/main HEAD (handles PR rebases correctly)".
        MERGE_BASE=$(git merge-base "${HEAD_SHA}" "${BASE_SHA}" 2>/dev/null || echo "")
        if [ -z "${MERGE_BASE}" ]; then
          echo "Could not compute merge-base; falling back to base SHA."
          MERGE_BASE="${BASE_SHA}"
        fi

        echo ""
        echo "Running per-function regression check (merge-base: ${MERGE_BASE:0:7} head: ${HEAD_SHA:0:7})..."

        set +e
        .agents/scripts/complexity-regression-helper.sh check \
          --base "${MERGE_BASE}" \
          --head "${HEAD_SHA}" \
          --output-md /tmp/complexity-report.md
        REGRESSION_EXIT=$?
        set -e

        # Post PR comment with report (update existing if present).
        if [ -s /tmp/complexity-report.md ] && [ -n "${PR_NUMBER}" ]; then
          # t2171: marker must be metric-suffixed to match write_report's
          # per-metric marker. Without the suffix, contains() never finds the
          # existing comment and every push appends a new one.
          marker="<!-- complexity-regression-gate:function-complexity -->"
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"$marker\")) | .id] | .[0] // empty" \
            2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh api "repos/${REPO}/issues/comments/${existing}" \
              --method PATCH -F body=@/tmp/complexity-report.md >/dev/null 2>&1 || true
          else
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" \
              --body-file /tmp/complexity-report.md >/dev/null 2>&1 || true
          fi
        fi

        if [ "${REGRESSION_EXIT}" -eq 0 ]; then
          echo "No new function complexity violations."
          exit 0
        fi

        # Allow override with label + justification section.
        if [ "${HAS_OVERRIDE}" = "true" ]; then
          echo "::warning::New function complexity violations detected but 'complexity-bump-ok' label is set — allowing with warning."
          exit 0
        fi

        echo "::error::New shell function complexity violations introduced in this PR. Add the 'complexity-bump-ok' label with a '## Complexity Bump Justification' section to override."
        exit 1

    - name: Shell nesting depth
      # t2171: per-file regression model replaces total-count-vs-threshold.
      # PRs fail only when they introduce NEW nesting-depth violations (set
      # difference B-A), not for pre-existing debt in base. The raw count is
      # reported as a non-blocking warning feeding the simplification routine.
      # Replaces the pulse "proximity scanner" that was filing duplicate
      # threshold-bump issues every 45 min (GH#19526-19582).
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        HAS_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'complexity-bump-ok') }}
        EVENT_NAME: ${{ github.event_name }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # --- Non-blocking warning: total violation count ---
        THRESHOLD=260
        if [ -f ".agents/configs/complexity-thresholds.conf" ]; then
          val=$(grep '^NESTING_DEPTH_THRESHOLD=' .agents/configs/complexity-thresholds.conf \
            | cut -d= -f2 || true)
          if [ -n "$val" ] && [ "$val" -eq "$val" ] 2>/dev/null; then
            THRESHOLD=$val
          fi
        fi

        echo "Scanning shell nesting depth (>8 levels)..."
        total_out=$(.agents/scripts/complexity-regression-helper.sh check --dry-run \
          --metric nesting-depth 2>/dev/null \
          | grep '^Total violations' || echo "Total violations (nesting): unknown")
        echo "$total_out"

        total=$(echo "$total_out" | grep -oE '[0-9]+$' || echo "0")
        if [ "$total" -gt "$THRESHOLD" ]; then
          echo "::warning::Nesting depth total: $total violations (threshold: $THRESHOLD). See simplification routine."
        else
          echo "Within simplification threshold ($THRESHOLD)"
        fi

        # --- Blocking gate: per-file regression check (PRs only) ---
        if [ "${EVENT_NAME}" != "pull_request" ]; then
          echo "Push event: skipping regression diff (no PR base). Total count warning above is advisory."
          exit 0
        fi

        if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
          echo "No base SHA available; skipping regression check."
          exit 0
        fi

        MERGE_BASE=$(git merge-base "${HEAD_SHA}" "${BASE_SHA}" 2>/dev/null || echo "")
        if [ -z "${MERGE_BASE}" ]; then
          echo "Could not compute merge-base; falling back to base SHA."
          MERGE_BASE="${BASE_SHA}"
        fi

        echo ""
        echo "Running per-file nesting regression check (merge-base: ${MERGE_BASE:0:7} head: ${HEAD_SHA:0:7})..."

        set +e
        .agents/scripts/complexity-regression-helper.sh check \
          --metric nesting-depth \
          --base "${MERGE_BASE}" \
          --head "${HEAD_SHA}" \
          --output-md /tmp/nesting-report.md
        REGRESSION_EXIT=$?
        set -e

        if [ -s /tmp/nesting-report.md ] && [ -n "${PR_NUMBER}" ]; then
          marker="<!-- complexity-regression-gate:nesting-depth -->"
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"$marker\")) | .id] | .[0] // empty" \
            2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh api "repos/${REPO}/issues/comments/${existing}" \
              --method PATCH -F body=@/tmp/nesting-report.md >/dev/null 2>&1 || true
          else
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" \
              --body-file /tmp/nesting-report.md >/dev/null 2>&1 || true
          fi
        fi

        if [ "${REGRESSION_EXIT}" -eq 0 ]; then
          echo "No new nesting depth violations."
          exit 0
        fi

        if [ "${HAS_OVERRIDE}" = "true" ]; then
          echo "::warning::New nesting depth violations detected but 'complexity-bump-ok' label is set — allowing with warning."
          exit 0
        fi

        echo "::error::New shell nesting depth violations introduced in this PR. Add the 'complexity-bump-ok' label with a '## Complexity Bump Justification' section to override."
        exit 1

    - name: File size check
      # t2171: per-file regression model replaces total-count-vs-threshold.
      # PRs fail only when they introduce NEW >1500-line files, not for
      # pre-existing debt in base. Raw count is non-blocking warning.
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        HAS_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'complexity-bump-ok') }}
        EVENT_NAME: ${{ github.event_name }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # --- Non-blocking warning: total violation count ---
        THRESHOLD=40
        if [ -f ".agents/configs/complexity-thresholds.conf" ]; then
          val=$(grep '^FILE_SIZE_THRESHOLD=' .agents/configs/complexity-thresholds.conf \
            | cut -d= -f2 || true)
          if [ -n "$val" ] && [ "$val" -eq "$val" ] 2>/dev/null; then
            THRESHOLD=$val
          fi
        fi

        echo "Scanning file sizes (>1500 lines)..."
        total_out=$(.agents/scripts/complexity-regression-helper.sh check --dry-run \
          --metric file-size 2>/dev/null \
          | grep '^Total violations' || echo "Total violations (file-size): unknown")
        echo "$total_out"

        total=$(echo "$total_out" | grep -oE '[0-9]+$' || echo "0")
        if [ "$total" -gt "$THRESHOLD" ]; then
          echo "::warning::File size total: $total violations (threshold: $THRESHOLD). See simplification routine."
        else
          echo "Within simplification threshold ($THRESHOLD)"
        fi

        # --- Blocking gate: per-file regression check (PRs only) ---
        if [ "${EVENT_NAME}" != "pull_request" ]; then
          echo "Push event: skipping regression diff (no PR base). Total count warning above is advisory."
          exit 0
        fi

        if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
          echo "No base SHA available; skipping regression check."
          exit 0
        fi

        MERGE_BASE=$(git merge-base "${HEAD_SHA}" "${BASE_SHA}" 2>/dev/null || echo "")
        if [ -z "${MERGE_BASE}" ]; then
          echo "Could not compute merge-base; falling back to base SHA."
          MERGE_BASE="${BASE_SHA}"
        fi

        echo ""
        echo "Running per-file size regression check (merge-base: ${MERGE_BASE:0:7} head: ${HEAD_SHA:0:7})..."

        set +e
        .agents/scripts/complexity-regression-helper.sh check \
          --metric file-size \
          --base "${MERGE_BASE}" \
          --head "${HEAD_SHA}" \
          --output-md /tmp/file-size-report.md
        REGRESSION_EXIT=$?
        set -e

        if [ -s /tmp/file-size-report.md ] && [ -n "${PR_NUMBER}" ]; then
          marker="<!-- complexity-regression-gate:file-size -->"
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"$marker\")) | .id] | .[0] // empty" \
            2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh api "repos/${REPO}/issues/comments/${existing}" \
              --method PATCH -F body=@/tmp/file-size-report.md >/dev/null 2>&1 || true
          else
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" \
              --body-file /tmp/file-size-report.md >/dev/null 2>&1 || true
          fi
        fi

        if [ "${REGRESSION_EXIT}" -eq 0 ]; then
          echo "No new file size violations."
          exit 0
        fi

        if [ "${HAS_OVERRIDE}" = "true" ]; then
          echo "::warning::New file size violations detected but 'complexity-bump-ok' label is set — allowing with warning."
          exit 0
        fi

        echo "::error::New file size violations introduced in this PR. Add the 'complexity-bump-ok' label with a '## Complexity Bump Justification' section to override."
        exit 1

    - name: Python cyclomatic complexity (Lizard)
      run: |
        source .agents/scripts/lint-file-discovery.sh
        lint_python_files

        echo "Checking Python cyclomatic complexity (CCN > 8)..."
        if [ -z "$LINT_PY_FILES" ]; then
          echo "No Python files found"
          exit 0
        fi

        # Run lizard with warnings-only mode (CCN > 8)
        lizard_output=$(echo "$LINT_PY_FILES" | xargs lizard --CCN 8 --warnings_only 2>/dev/null || true)
        if [ -n "$lizard_output" ]; then
          echo "$lizard_output"
          violations=$(echo "$lizard_output" | grep -c "warning:" || echo "0")
          echo ""
          echo "Python complexity violations: $violations"
          # Advisory — Codacy is the hard gate for Python
          echo "::warning::$violations Python functions exceed cyclomatic complexity 8"
        else
          echo "No Python complexity violations"
        fi

    - name: Python import check (Pyflakes)
      run: |
        source .agents/scripts/lint-file-discovery.sh
        lint_python_files

        echo "Checking Python imports..."
        if [ -z "$LINT_PY_FILES" ]; then
          echo "No Python files found"
          exit 0
        fi

        pyflakes_output=$(echo "$LINT_PY_FILES" | xargs pyflakes 2>/dev/null || true)
        if [ -n "$pyflakes_output" ]; then
          echo "$pyflakes_output"
          violations=$(echo "$pyflakes_output" | grep -c . || echo "0")
          echo ""
          echo "Pyflakes issues: $violations"
          echo "::warning::$violations Python import/usage issues found"
        else
          echo "No Pyflakes issues"
        fi

  qlty-smells:
    name: Qlty Maintainability Smells
    runs-on: ubuntu-latest
    # Only run on PRs — diff mode needs a comparison base.
    #
    # NOTE (t2065, GH#18773): a richer per-rule / per-file regression
    # gate lives in `.github/workflows/qlty-regression.yml`. That gate
    # provides the PR comment with breakdowns, SARIF artifact upload,
    # and the `ratchet-bump` label override. This job stays as a simple
    # belt-and-braces check that leverages qlty's built-in diff mode.
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0

    - name: Install Qlty CLI
      uses: qltysh/qlty-action/install@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0

    - name: Qlty smells check (diff mode)
      run: |
        echo "Checking for new code smells vs origin/main..."
        if qlty smells 2>&1 | tee /tmp/qlty-smells-output.txt | grep -q '^[^ ]'; then
          smell_count=$(grep -c '^[^ ]' /tmp/qlty-smells-output.txt || echo "0")
          echo ""
          echo "::error::This PR introduces ${smell_count} new code smell(s). Fix before merging."
          echo "Run 'qlty smells' locally to see details."
          exit 1
        else
          echo "No new code smells introduced"
        fi

  # GH#18775 (t2067): absolute-threshold ratchet for the total qlty smell count.
  # Complementary to the qlty-smells job above: that one enforces "no new smells
  # in this PR" (per-PR delta); this one enforces "total count is bounded by
  # QLTY_SMELL_THRESHOLD and monotonically decreases over time". First ratchet
  # counter that covers non-shell files (Python/JS/TS/mjs). Auto-ratcheted down
  # by ratchet-post-merge.yml when the count drops below threshold - 2.
  qlty-smell-threshold:
    name: Qlty Smell Threshold
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Install Qlty CLI
      uses: qltysh/qlty-action/install@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0

    - name: Qlty smell threshold check
      run: |
        # Read threshold from config (GH#18775 — ratchetable smell counter)
        THRESHOLD=0
        if [ -f ".agents/configs/complexity-thresholds.conf" ]; then
          val=$(grep '^QLTY_SMELL_THRESHOLD=' .agents/configs/complexity-thresholds.conf | cut -d= -f2 || true)
          if [ -n "$val" ] && [ "$val" -eq "$val" ] 2>/dev/null; then
            THRESHOLD=$val
          fi
        fi
        if [ "$THRESHOLD" -eq 0 ]; then
          echo "::warning::QLTY_SMELL_THRESHOLD not set in complexity-thresholds.conf — skipping check"
          exit 0
        fi

        echo "Counting total qlty smells across all files..."
        sarif=$(qlty smells --all --sarif --no-snippets --quiet 2>/dev/null || true)
        if [ -z "$sarif" ]; then
          echo "::error::Failed to run qlty smells (empty SARIF output)"
          exit 1
        fi

        count=$(echo "$sarif" | jq '.runs[0].results | length')
        if ! [ "$count" -eq "$count" ] 2>/dev/null; then
          echo "::error::Failed to parse smell count from SARIF output"
          exit 1
        fi

        echo ""
        echo "Total qlty smells: $count"
        echo "Threshold:         $THRESHOLD"
        echo ""

        if [ "$count" -gt "$THRESHOLD" ]; then
          echo "::error::Qlty smell regression: $count smells exceeds threshold $THRESHOLD"
          echo ""
          echo "Per-rule breakdown:"
          echo "$sarif" | jq -r '.runs[0].results | group_by(.ruleId) | map({rule: .[0].ruleId, count: length}) | sort_by(-.count) | .[] | "  \(.count)\t\(.rule)"'
          echo ""
          echo "Top 20 files by smell count:"
          echo "$sarif" | jq -r '.runs[0].results | group_by(.locations[0].physicalLocation.artifactLocation.uri) | map({file: .[0].locations[0].physicalLocation.artifactLocation.uri, count: length}) | sort_by(-.count) | .[0:20] | .[] | "  \(.count)\t\(.file)"'
          echo ""
          echo "Fix options:"
          echo "  1. Reduce smells in your PR (preferred) — run 'qlty smells --all' locally"
          echo "  2. Justify a bump of QLTY_SMELL_THRESHOLD in complexity-thresholds.conf"
          echo "     with a history entry in complexity-thresholds-history.md"
          exit 1
        fi

        headroom=$((THRESHOLD - count))
        echo "Within threshold ($headroom headroom)"

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    # Job-level env so that step `if:` conditions can reference env.SONAR_TOKEN
    # (step-level env: blocks are applied AFTER the if: is evaluated)
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: SonarCloud Scan
      if: env.SONAR_TOKEN != ''
      uses: SonarSource/sonarqube-scan-action@40f5b61913e891f9d316696628698051136015be
      # SonarCloud may fail on fork PR merge refs even when SONAR_TOKEN is
      # available (e.g., maintainer re-runs). Non-fatal — other quality tools
      # (Codacy, CodeFactor, Qlty) still provide coverage.
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: SonarCloud Scan Skipped
      if: env.SONAR_TOKEN == ''
      run: |
        echo "::warning::SONAR_TOKEN not configured — skipping SonarCloud scan"
        echo "Add SONAR_TOKEN to repository secrets to enable SonarCloud analysis"

    - name: Codacy Integration Check
      # Codacy analysis runs via the Codacy Production GitHub App (not this workflow).
      # This step only verifies the API token is configured for Codacy API access.
      # The "Codacy Static Code Analysis" check run is posted by the Codacy App
      # independently on each PR commit.
      run: |
        if [[ -n "$CODACY_API_TOKEN" ]]; then
          echo "Codacy API token: configured"
          echo "Codacy GitHub App: runs analysis independently on PRs"
          echo "Dashboard: https://app.codacy.com/gh/marcusquinn/aidevops"
        else
          echo "::notice::CODACY_API_TOKEN not configured — Codacy API access unavailable"
          echo "Note: Codacy GitHub App analysis still runs if the app is installed"
        fi

    - name: Quality Analysis Summary
      run: |
        echo "Code Quality Analysis Summary"
        echo "================================"
        if [[ -n "$SONAR_TOKEN" ]]; then
          echo "SonarCloud: Analysis completed (via workflow action)"
        else
          echo "SonarCloud: Skipped (SONAR_TOKEN not configured)"
        fi
        echo "Codacy: Runs via GitHub App (independent of this workflow)"
        echo ""
        echo "View Results:"
        echo "   SonarCloud: https://sonarcloud.io/project/overview?id=marcusquinn_aidevops"
        echo "   Codacy: https://app.codacy.com/gh/marcusquinn/aidevops"
        echo ""
        echo "Code Quality Pipeline: COMPLETE"

  # t2241: markdownlint scoped to changed-line ranges.
  # Lints changed markdown files but only fails on violations whose line
  # numbers fall inside hunks changed by the PR. Pre-existing violations
  # in unchanged lines are ignored (ratchet semantics).
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'

    - name: Markdownlint (changed-line scoped)
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        HAS_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'lint-baseline-ok') }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        MERGE_BASE=$(git merge-base "${HEAD_SHA}" "${BASE_SHA}" 2>/dev/null || echo "")
        if [ -z "${MERGE_BASE}" ]; then
          MERGE_BASE="${BASE_SHA}"
        fi

        echo "Running markdownlint (changed-line scoped, merge-base: ${MERGE_BASE:0:7} head: ${HEAD_SHA:0:7})..."

        set +e
        .agents/scripts/markdownlint-diff-helper.sh \
          --base "${MERGE_BASE}" \
          --head "${HEAD_SHA}" \
          --output-md /tmp/markdownlint-report.md
        GATE_EXIT=$?
        set -e

        # Post/update PR comment with report
        if [ -s /tmp/markdownlint-report.md ] && [ -n "${PR_NUMBER}" ]; then
          marker="<!-- markdownlint-diff-gate -->"
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"$marker\")) | .id] | .[0] // empty" \
            2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh api "repos/${REPO}/issues/comments/${existing}" \
              --method PATCH -F body=@/tmp/markdownlint-report.md >/dev/null 2>&1 || true
          else
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" \
              --body-file /tmp/markdownlint-report.md >/dev/null 2>&1 || true
          fi
        fi

        if [ "${GATE_EXIT}" -eq 0 ]; then
          echo "No new markdownlint violations in changed lines."
          exit 0
        fi

        if [ "${HAS_OVERRIDE}" = "true" ]; then
          echo "::warning::New markdownlint violations detected but 'lint-baseline-ok' label is set — allowing with warning."
          exit 0
        fi

        echo "::error::New markdownlint violations introduced in changed lines of this PR."
        echo "Fix the violations above, or add the 'lint-baseline-ok' label to override."
        exit 1

  # t2241: biome scoped via baseline diff.
  # Counts biome lint violations at the PR merge-base and at HEAD,
  # fails only when the PR introduces a net increase. Pre-existing
  # violations are tolerated (ratchet semantics, mirrors t2065 qlty gate).
  biome:
    name: Biome CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'

    - name: Biome lint (baseline diff)
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        HAS_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'lint-baseline-ok') }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        MERGE_BASE=$(git merge-base "${HEAD_SHA}" "${BASE_SHA}" 2>/dev/null || echo "")
        if [ -z "${MERGE_BASE}" ]; then
          MERGE_BASE="${BASE_SHA}"
        fi

        echo "Running biome lint (baseline diff, merge-base: ${MERGE_BASE:0:7} head: ${HEAD_SHA:0:7})..."

        set +e
        .agents/scripts/markdownlint-diff-helper.sh \
          --mode biome \
          --base "${MERGE_BASE}" \
          --head "${HEAD_SHA}" \
          --output-md /tmp/biome-report.md
        GATE_EXIT=$?
        set -e

        # Post/update PR comment with report
        if [ -s /tmp/biome-report.md ] && [ -n "${PR_NUMBER}" ]; then
          marker="<!-- biome-diff-gate -->"
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"$marker\")) | .id] | .[0] // empty" \
            2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh api "repos/${REPO}/issues/comments/${existing}" \
              --method PATCH -F body=@/tmp/biome-report.md >/dev/null 2>&1 || true
          else
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" \
              --body-file /tmp/biome-report.md >/dev/null 2>&1 || true
          fi
        fi

        if [ "${GATE_EXIT}" -eq 0 ]; then
          echo "No new biome violations."
          exit 0
        fi

        if [ "${HAS_OVERRIDE}" = "true" ]; then
          echo "::warning::New biome violations detected but 'lint-baseline-ok' label is set — allowing with warning."
          exit 0
        fi

        echo "::error::New biome lint violations introduced in this PR."
        echo "Fix the violations, or add the 'lint-baseline-ok' label to override."
        exit 1
