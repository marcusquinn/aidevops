name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BODY=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | sed '$d')
          PREV_TAG=$(git describe --tags --abbrev=0 "v$VERSION^" 2>/dev/null || echo '')
          if [ -n "$PREV_TAG" ]; then
            EXTRA=$(git log --oneline "$PREV_TAG..v$VERSION" -- | grep -v 'chore: claim t' | head -10)
            BODY="$BODY"$'\n\n### Commits since CHANGELOG generation\n'"$EXTRA"
          fi
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          printf '%s\n' "$BODY" > "$NOTES_FILE"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .github/scripts/publish-github-release.sh \
            "$GITHUB_REF_NAME" \
            "$GITHUB_REF_NAME" \
            "${{ steps.changelog.outputs.notes_file }}"
