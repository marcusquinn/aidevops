name: Issue Sync - Bi-directional TODO.md ↔ GitHub Issues

# Thin caller for the reusable workflow at .github/workflows/issue-sync-reusable.yml.
# aidevops eats its own dogfood — it calls the same reusable workflow that
# downstream repos call via `uses: marcusquinn/aidevops/.github/workflows/issue-sync-reusable.yml@main`.
# The only difference is the relative-path `uses:` here vs the absolute path there.
#
# Downstream caller template: .agents/templates/workflows/issue-sync-caller.yml
# Architecture: .agents/reference/reusable-workflows.md

on:
  push:
    branches: [main]
    paths:
      - 'TODO.md'
      - 'todo/PLANS.md'
      - 'todo/tasks/**'
  pull_request_target:
    branches: [main]
    types: [opened, edited, closed, reopened]
  issues:
    types: [opened, edited, assigned, closed, reopened]
  workflow_dispatch:
    inputs:
      command:
        description: 'Sync command to run'
        required: true
        default: 'status'
        type: choice
        options:
          - status
          - pull
          - push
          - close
          - reconcile
          - enrich
          - event
          - audit
      subject_id:
        description: 'Immutable forge node ID (manual event only)'
        required: false
        type: string
      cursor:
        description: 'RFC3339 event cursor (manual event only)'
        required: false
        type: string
      task_id:
        description: 'Explicit trusted task ID (manual event only)'
        required: false
        type: string

jobs:
  sync:
    uses: ./.github/workflows/issue-sync-reusable.yml
    secrets: inherit
    with:
      command: ${{ inputs.command || '' }}
      subject_id: ${{ inputs.subject_id || '' }}
      cursor: ${{ inputs.cursor || '' }}
      task_id: ${{ inputs.task_id || '' }}
