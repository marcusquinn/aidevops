name: Qlty Regression Gate

# t2065: block PRs that increase the total qlty smell count.
#
# Runs `qlty smells --all --sarif` against (a) the PR merge-base and
# (b) the PR head, computes the total-count delta, and fails the check
# when the PR introduces a net increase. Richer than the existing
# `qlty-smells` job in `code-quality.yml` (which uses qlty's built-in
# diff mode): this workflow provides per-rule and per-file breakdowns
# in a PR comment, uploads SARIF artifacts, and supports a
# `ratchet-bump` label override for justified increases.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    # t2220: suppress concurrency-cancellation cascade on docs-only PRs.
    # `gh pr create --label "a,b,c,d"` fires one `labeled` event per label
    # after the initial `opened`; each event triggers a new run that
    # cancels the in-flight one via `cancel-in-progress: true`. Docs-only
    # PRs observed 15+ cancelled runs per workflow, which `gh pr checks`
    # then surfaces as `fail` (it displays `cancelled` conclusions as
    # `fail` in its TSV output). Filtering docs-only at the trigger
    # level prevents the cascade entirely. In-workflow `detect-scope`
    # still runs for mixed PRs as a belt-and-suspenders check.
    paths-ignore:
      - '**/*.md'
      - 'todo/**'

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-scope:
    name: Detect PR scope
    runs-on: ubuntu-latest
    outputs:
      should_scan: ${{ steps.scope.outputs.should_scan }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Determine scope
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          set -euo pipefail
          # Guard: skip full re-scan when an unrelated label is applied.
          # Applying labels like 'status:in-review' or 'origin:worker' would
          # otherwise trigger a full Qlty scan. Only 'ratchet-bump' needs a rescan.
          if [ "${EVENT_ACTION}" = "labeled" ] && [ "${LABEL_NAME}" != "ratchet-bump" ]; then
            echo "Skipping: labeled event for '${LABEL_NAME}' is not 'ratchet-bump' — no rescan needed."
            echo "should_scan=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Base: $BASE_SHA"
          echo "Head: $HEAD_SHA"
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          if [ -z "$changed" ]; then
            echo "No files changed; skipping qlty scan."
            echo "should_scan=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf 'Changed files:\n%s\n' "$changed"
          # Docs-only bypass: PR touches only markdown, todo/**, or non-workflow .github/ md
          non_doc=$(printf '%s\n' "$changed" | grep -Ev \
            -e '^([A-Za-z0-9_.-]*\.md)$' \
            -e '^todo/' \
            -e '^TODO\.md$' \
            -e '^\.github/.*\.md$' \
            || true)
          if [ -z "$non_doc" ]; then
            echo "Docs-only PR; skipping qlty scan."
            echo "should_scan=false" >> "$GITHUB_OUTPUT"
          else
            echo "Non-doc files changed; running qlty scan."
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
          fi

  qlty-diff:
    name: Qlty Smell Regression
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.should_scan == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Qlty CLI
        uses: qltysh/qlty-action/install@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0

      - name: Run qlty regression diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          .agents/scripts/qlty-regression-helper.sh \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --output-md /tmp/qlty-report.md \
            --sarif-base /tmp/qlty-base.sarif \
            --sarif-head /tmp/qlty-head.sarif
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "---- report ----"
          cat /tmp/qlty-report.md || true

      - name: Upload SARIF artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: qlty-sarif-${{ github.event.pull_request.number }}
          path: |
            /tmp/qlty-base.sarif
            /tmp/qlty-head.sarif
            /tmp/qlty-report.md
          retention-days: 14
          if-no-files-found: ignore

      - name: Post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          body_file=/tmp/qlty-report.md
          if [ ! -s "$body_file" ]; then
            echo "No report to post."
            exit 0
          fi
          marker="<!-- qlty-regression-gate -->"
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"$marker\")) | .id] | .[0] // empty" \
            2>/dev/null || true)
          if [ -n "$existing" ]; then
            echo "Updating existing comment $existing"
            gh api "repos/${REPO}/issues/comments/${existing}" \
              --method PATCH -F body=@"$body_file" >/dev/null 2>&1 || true
          else
            echo "Creating new comment"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file "$body_file" \
              >/dev/null 2>&1 || true
          fi

      - name: Enforce gate
        env:
          HAS_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'ratchet-bump') }}
          HAS_SIMPLIFICATION: ${{ contains(github.event.pull_request.labels.*.name, 'simplification') }}
          AUTHOR_ASSOC: ${{ github.event.pull_request.author_association }}
          EXIT_CODE: ${{ steps.diff.outputs.exit_code }}
        run: |
          set -euo pipefail
          if [ "$EXIT_CODE" = "0" ]; then
            echo "Qlty smell count: no regression."
            exit 0
          fi
          if [ "$HAS_OVERRIDE" = "true" ]; then
            # t2133: simplification PRs cannot use ratchet-bump — their goal is to reduce smells, not shift them.
            if [ "$HAS_SIMPLIFICATION" = "true" ]; then
              echo "::error::Qlty smell regression detected. 'ratchet-bump' is not allowed on PRs labeled 'simplification' — the goal is to reduce smells, not shift them. Remove the 'ratchet-bump' label and fix the regression."
              exit 1
            fi
            # t2133: ratchet-bump requires maintainer (OWNER/MEMBER) authorship.
            # Workers (COLLABORATOR/CONTRIBUTOR) cannot self-override — prevents
            # workers from gaming the gate with plausible-sounding justifications.
            if [ "$AUTHOR_ASSOC" != "OWNER" ] && [ "$AUTHOR_ASSOC" != "MEMBER" ]; then
              echo "::error::Qlty smell regression detected. 'ratchet-bump' override requires OWNER or MEMBER authorship (got: ${AUTHOR_ASSOC}). Ask a maintainer to apply the label if the regression is justified."
              exit 1
            fi
            echo "::warning::Qlty smell regression detected but 'ratchet-bump' label is set by maintainer — allowing with warning."
            exit 0
          fi
          echo "::error::Qlty smell regression detected (exit $EXIT_CODE). Add the 'ratchet-bump' label to override if justified (maintainer only)."
          exit 1
