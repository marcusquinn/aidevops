name: Issue Sync (reusable) - Forge event coordinator

on:
  workflow_call:
    inputs:
      command:
        description: 'Manual operation (event, reconcile, or audit)'
        required: false
        type: string
        default: 'event'
      subject_id:
        description: 'Immutable forge node ID for a manual event'
        required: false
        type: string
        default: ''
      cursor:
        description: 'RFC3339 cursor for a manual event'
        required: false
        type: string
        default: ''
      aidevops_ref:
        description: 'aidevops ref containing coordinator scripts'
        required: false
        type: string
        default: 'main'
      runner:
        description: 'Runner label override'
        required: false
        type: string
        default: 'ubuntu-latest'

jobs:
  forge-event:
    name: Record repository-bound forge event
    if: github.event_name != 'workflow_dispatch' || inputs.command == 'event'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 3
    permissions:
      contents: read
      issues: read
      pull-requests: read
    concurrency:
      group: forge-event-${{ github.repository_id }}-${{ github.event.issue.node_id || github.event.pull_request.node_id || github.event.after || inputs.subject_id || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Checkout coordinator scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: marcusquinn/aidevops
          path: __aidevops
          ref: ${{ inputs.aidevops_ref || 'main' }}
          fetch-depth: 1

      - name: Normalize event into coordinator operation
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action || '' }}
          EVENT_MERGED: ${{ github.event.pull_request.merged || false }}
          EVENT_SUBJECT_ID: ${{ github.event.issue.node_id || github.event.pull_request.node_id || github.event.after || inputs.subject_id }}
          EVENT_CURSOR: ${{ github.event.issue.updated_at || github.event.pull_request.updated_at || github.event.head_commit.timestamp || inputs.cursor }}
          EVENT_OPERATION_ID: ${{ github.event.issue.node_id || github.event.pull_request.node_id || github.event.after || inputs.subject_id || github.run_id }}-${{ github.event.issue.updated_at || github.event.pull_request.updated_at || github.event.head_commit.timestamp || inputs.cursor || github.run_attempt }}-${{ github.event.action || github.event_name }}
          REPOSITORY_ID: ${{ github.repository_id }}
          REPOSITORY_SLUG: ${{ github.repository }}
        run: bash __aidevops/.agents/scripts/forge-event-helper.sh

  cursor-reconciliation:
    name: Bounded cursor repair/audit
    if: github.event_name == 'workflow_dispatch' && (inputs.command == 'reconcile' || inputs.command == 'audit')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout repository for repair evidence
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout reconciliation scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: marcusquinn/aidevops
          path: __aidevops
          ref: ${{ inputs.aidevops_ref || 'main' }}
          fetch-depth: 1

      - name: Reconcile missed events from mapping cursors
        env:
          AIDEVOPS_RECONCILE_MAX_ISSUES: '100'
          AIDEVOPS_RECONCILE_MAX_SECONDS: '480'
          GH_TOKEN: ${{ github.token }}
          SYNC_COMMAND: ${{ inputs.command }}
        run: bash __aidevops/.agents/scripts/issue-sync-helper.sh "$SYNC_COMMAND" --verbose
