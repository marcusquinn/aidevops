name: AGENTS.md size check

on:
  pull_request:
    paths:
      - '.agents/AGENTS.md'
      - 'AGENTS.md'
      - '.agents/prompts/build.txt'
      - '.github/workflows/agents-md-size-check.yml'
  push:
    branches:
      - main
    paths:
      - '.agents/AGENTS.md'
      - 'AGENTS.md'
      - '.agents/prompts/build.txt'
      - '.github/workflows/agents-md-size-check.yml'

permissions:
  contents: read

jobs:
  size:
    name: Check always-loaded prompt size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce AGENTS.md byte ratchet
        shell: bash
        run: |
          set -euo pipefail

          max_bytes=24000
          file='.agents/AGENTS.md'

          if [[ ! -f "${file}" ]]; then
            echo "::error::${file} is missing"
            exit 1
          fi

          bytes=$(wc -c < "${file}" | tr -d ' ')
          approx_tokens=$(( (bytes + 3) / 4 ))

          echo "${file}: ${bytes} bytes (~${approx_tokens} tokens by chars/4)"
          echo "Limit: ${max_bytes} bytes (~6000 tokens)"

          if (( bytes > max_bytes )); then
            echo "::error::${file} is ${bytes} bytes, above ${max_bytes}. Move detail to reference/workflow docs and keep only pointers in always-loaded context."
            exit 1
          fi

          echo "AGENTS.md size check passed"

      - name: Validate contributor guidance references
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path("AGENTS.md")
          text = root.read_text(encoding="utf-8")
          errors = []

          for path_text in sorted(set(re.findall(r"`(\.agents/[^`\s]+)", text))):
              path = pathlib.Path(path_text)
              if not path.exists():
                  errors.append(f"{root}: broken local path: {path_text}")

          reference_pattern = re.compile(r'`(?P<path>\.agents/[^`]+\.md)` "(?P<headings>[^"]+)"')
          for match in reference_pattern.finditer(text):
              path = pathlib.Path(match.group("path"))
              if not path.is_file():
                  continue
              headings = {
                  heading.group(1).strip()
                  for heading in re.finditer(r"^#{1,6}\s+(.+?)\s*$", path.read_text(encoding="utf-8"), re.MULTILINE)
              }
              for expected in (part.strip() for part in match.group("headings").split(" > ")):
                  if expected not in headings:
                      errors.append(f'{root}: missing heading "{expected}" in {path}')

          if errors:
              print("\n".join(errors), file=sys.stderr)
              raise SystemExit(1)
          print("Contributor guidance references passed")
          PY
