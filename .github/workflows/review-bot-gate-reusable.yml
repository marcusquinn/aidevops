name: Review Bot Gate (reusable)

# Reusable workflow — call via a thin caller YAML in each repo.
# See: .agents/templates/workflows/review-bot-gate-caller.yml
# See: .agents/reference/reusable-workflows.md
#
# The caller declares the triggers (pull_request / pull_request_review / issue_comment)
# and the concurrency group. All gate logic lives here; the framework helper
# is fetched at runtime via the coupled aidevops_repository/aidevops_ref inputs.
#
# GH#20727: migrated from vendored full-copy (SHA-pinned checkout) to
# reusable-workflow pattern. Helper is now fetched from marcusquinn/aidevops
# at run-time, eliminating the stale-pin drift class — the root cause of the
# downstream regression observed on 2026-04-24 (Option A' settlement fix from
# PR #20572 never reached downstream repos pinned to SHA 73b664a).
#
# To enforce: add "review-bot-gate" as a required status check in
# GitHub branch protection settings for each repo.
#
# Rate-limit behaviour: controlled by `review_gate.rate_limit_behavior` in
# ~/.config/aidevops/repos.json. Default: "pass". See:
# .agents/reference/repos-json-fields.md "review_gate" field.
#
# t1382: https://github.com/marcusquinn/aidevops/issues/2735
# GH#20493: Migrate from inline gate logic to helper (t2139 settlement fix)
# GH#20727: Migrate from SHA-pinned checkout to reusable-workflow pattern

on:
  workflow_call:
    inputs:
      aidevops_repository:
        description: 'Repository to fetch framework scripts from (defaults to the canonical aidevops repository)'
        required: false
        type: string
        default: 'marcusquinn/aidevops'
      aidevops_ref:
        description: 'aidevops ref to fetch framework scripts from (main, or a version tag like v3.9.0)'
        required: false
        type: string
        default: 'main'
      runner:
        description: 'Runner label override (e.g. ubicloud-standard-2). Defaults to ubuntu-latest.'
        required: false
        default: 'ubuntu-latest'
        type: string
      rate_limit_behavior:
        description: 'API/bot rate-limit policy: pass (default) or wait'
        required: false
        default: 'pass'
        type: string
      completion_behavior:
        description: 'Review completion policy: fast (default) or strict'
        required: false
        default: 'fast'
        type: string
    secrets:
      AIDEVOPS_READ_TOKEN:
        required: false
        description: 'Optional token with read access to a private configured helper repository'

jobs:
  review-bot-gate:
    runs-on: ${{ inputs.runner }}
    # Only run on PRs (issue_comment fires for PR comments too).
    # GH#27137: bot review submissions and inline comments must re-evaluate the
    # gate. Human replies cannot change AI-review evidence and must not replace
    # a successful exact-head check with an API-quota failure.
    if: >
      (
        github.event_name == 'pull_request' ||
        (
          (
            github.event_name == 'pull_request_review' ||
            (
              github.event_name == 'pull_request_review_comment' &&
              github.event.comment.in_reply_to_id == null
            ) ||
            (github.event_name == 'issue_comment' && github.event.issue.pull_request)
          ) &&
          (
            github.actor == 'coderabbitai' ||
            github.actor == 'coderabbitai[bot]' ||
            github.actor == 'gemini-code-assist' ||
            github.actor == 'gemini-code-assist[bot]' ||
            github.actor == 'augment-code' ||
            github.actor == 'augment-code[bot]' ||
            github.actor == 'augmentcode' ||
            github.actor == 'augmentcode[bot]' ||
            github.actor == 'copilot' ||
            github.actor == 'copilot[bot]' ||
            github.actor == 'github-actions[bot]'
          )
        )
      )

    permissions:
      pull-requests: read
      contents: read
      statuses: write

    steps:
      - name: Checkout aidevops framework scripts
        # Fetch review-bot-gate-helper.sh from marcusquinn/aidevops at runtime.
        # GH#20727: replaces the SHA-pinned checkout (path: .aidevops-helper) that
        # silently drifted after helper changes (e.g. the Option A' settlement fix
        # in PR #20572 never propagated to downstream repos pinned to 73b664a).
        # Repository and ref are controlled by the caller provenance inputs.
        # Pin to @v3.x.y for stability; see .agents/reference/reusable-workflows.md.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ inputs.aidevops_repository || 'marcusquinn/aidevops' }}
          ref: ${{ inputs.aidevops_ref || 'main' }}
          path: __aidevops
          fetch-depth: 1
          token: ${{ secrets.AIDEVOPS_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check for AI review bot activity
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPO: ${{ github.repository }}
          REVIEW_GATE_EVENT_NAME: ${{ github.event_name }}
          REVIEW_GATE_EVENT_ACTION: ${{ github.event.action }}
          REVIEW_GATE_EVENT_ACTOR: ${{ github.actor }}
          REVIEW_GATE_EVENT_BODY: ${{ github.event.review.body || github.event.comment.body || '' }}
          REVIEW_GATE_REVIEW_STATE: ${{ github.event.review.state || '' }}
          REVIEW_GATE_EVIDENCE_HEAD_SHA: ${{ github.event.review.commit_id || github.event.comment.commit_id || '' }}
          REVIEW_GATE_EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          REVIEW_GATE_AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association || github.event.issue.author_association || '' }}
          REVIEW_GATE_RATE_LIMIT_BEHAVIOR: ${{ inputs.rate_limit_behavior }}
          REVIEW_GATE_COMPLETION_BEHAVIOR: ${{ inputs.completion_behavior }}
        run: |
          echo "Checking PR #${PR_NUMBER} for AI review bot activity..."

          # Check if this is an external contributor PR using immutable event
          # evidence, so API exhaustion cannot accidentally grant trust.
          # GH#17671: external-contributor PRs require real bot reviews;
          # rate-limit grace is disabled — they cannot merge on rate-limit-only.
          #aidevops:trust-boundary
          case "${REVIEW_GATE_AUTHOR_ASSOCIATION}" in
          OWNER|MEMBER|COLLABORATOR)
            IS_EXTERNAL_PR=false
            ;;
          *)
            IS_EXTERNAL_PR=true
            echo "External contributor PR detected — rate-limit grace DISABLED"
            # Override to 'wait': prevents the default PASS_RATE_LIMITED shortcut.
            export REVIEW_GATE_RATE_LIMIT_BEHAVIOR=wait
            ;;
          esac
          echo "is_external_pr=${IS_EXTERNAL_PR}" >> "${GITHUB_OUTPUT}"

          # Invoke the framework helper (runtime-fetched via __aidevops/).
          # All gate logic lives in the helper:
          #   - t2139 settlement check (defeats CodeRabbit two-phase placeholder)
          #   - KNOWN_BOTS and NON_REVIEW_PATTERNS (including "Review failed/skipped")
          #   - any_bot_has_success_status (status check fallback, GH#3005)
          #   - rate-limit behaviour (configurable via repos.json or env var)
          # Output values: PASS / PASS_RATE_LIMITED / WAITING / SKIP
          # Exit codes:    0 = PASS/PASS_RATE_LIMITED/SKIP  1 = WAITING  2 = error
          HELPER="${GITHUB_WORKSPACE}/__aidevops/.agents/scripts/review-bot-gate-helper.sh"
          RESULT=""
          HELPER_EXIT=0
          HELPER_STDERR=$(mktemp)
          EVENT_RESULT=""
          if EVENT_RESULT=$(bash "${HELPER}" event-check 2>"${HELPER_STDERR}"); then
            RESULT="${EVENT_RESULT}"
            echo "Accepted trusted review evidence from ${REVIEW_GATE_EVENT_NAME}:${REVIEW_GATE_EVENT_ACTION}."
          else
            RESULT=$(bash "${HELPER}" check "${PR_NUMBER}" "${REPO}" 2>"${HELPER_STDERR}") || HELPER_EXIT=$?
          fi
          cat "${HELPER_STDERR}" >&2

          INFRA_DEFERRED=false
          # API exhaustion is an infrastructure condition, not evidence that a
          # bot failed to review. Trusted default-pass PRs defer late feedback to
          # the post-merge scanner; external or explicit wait/strict policies
          # remain fail-closed. The classifier uses event/config evidence only.
          if grep -qiE 'API rate limit exceeded|x-ratelimit-remaining[^0-9]*0' "${HELPER_STDERR}"; then
            RESULT=$(bash "${HELPER}" classify-infra-rate-limit \
              "${REVIEW_GATE_AUTHOR_ASSOCIATION}" "${REPO}")
            if [[ "${RESULT}" == "PASS_RATE_LIMITED" ]]; then
              HELPER_EXIT=0
              INFRA_DEFERRED=true
              echo "GitHub API quota exhausted; trusted default-pass policy delegates late feedback to the post-merge review scanner."
            else
              HELPER_EXIT=2
            fi
          fi
          rm -f "${HELPER_STDERR}"

          echo ""
          echo "Helper result: ${RESULT:-<empty>} (exit: ${HELPER_EXIT})"

          # GH#17671 post-mortem: external-contributor PRs cannot use the
          # skip-review-gate label. The helper honours SKIP without knowing
          # about external-contributor — override here at the workflow layer.
          if [[ "${RESULT}" == "SKIP" && "${IS_EXTERNAL_PR}" == "true" ]]; then
            echo "SKIP overridden: external-contributor PRs cannot use skip-review-gate."
            RESULT="WAITING"
            HELPER_EXIT=1
          fi

          if [[ "${HELPER_EXIT}" -eq 0 ]]; then
            echo "gate_passed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "gate_passed=false" >> "${GITHUB_OUTPUT}"
          fi
          echo "result=${RESULT}" >> "${GITHUB_OUTPUT}"
          echo "infra_deferred=${INFRA_DEFERRED}" >> "${GITHUB_OUTPUT}"

      - name: Check for skip label
        id: skip
        if: steps.check.outputs.gate_passed != 'true' && steps.check.outputs.result != 'INFRA_RATE_LIMITED'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPO: ${{ github.repository }}
          IS_EXTERNAL_PR: ${{ steps.check.outputs.is_external_pr }}
        run: |
          LABELS=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" \
            --json labels -q '.labels[].name' 2>/dev/null || echo "")

          # GH#17671 post-mortem: external-contributor PRs cannot skip the
          # review gate. The skip label is only for internal PRs where bots
          # are genuinely not configured.
          if [[ "${IS_EXTERNAL_PR}" == "true" ]]; then
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            echo "DENY: external-contributor PR cannot use skip-review-gate label."
          elif echo "${LABELS}" | grep -q "skip-review-gate"; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "SKIP: 'skip-review-gate' label found — bypassing review bot gate."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Gate result
        if: steps.check.outputs.gate_passed != 'true' && steps.skip.outputs.skip != 'true'
        env:
          RESULT: ${{ steps.check.outputs.result }}
          INFRA_DEFERRED: ${{ steps.check.outputs.infra_deferred }}
        run: |
          if [[ "${RESULT}" == "INFRA_RATE_LIMITED" ]]; then
            echo "::error::Review state could not be evaluated because GitHub API quota is exhausted."
          elif [[ "${RESULT}" == "WAITING" || -z "${RESULT}" ]]; then
            echo "::error::No AI review bots have posted a real, settled review on this PR yet."
          else
            echo "::error::Review bot gate blocked (helper result: ${RESULT})."
          fi
          echo ""
          if [[ "${RESULT}" == "INFRA_RATE_LIMITED" ]]; then
            echo "This is an infrastructure wait, not a missing-review finding."
            echo "Re-run after the GitHub API reset; do not retry-loop before then."
            exit 1
          fi
          echo "This PR cannot be merged until at least one AI code review bot"
          echo "(CodeRabbit, Gemini Code Assist, etc.) has posted a real review."
          echo ""
          echo "What to do:"
          echo "  1. Wait a few minutes for bots to complete their analysis"
          echo "  2. This check re-runs automatically when a bot posts or edits a comment"
          echo "  3. If no bots are configured, add 'skip-review-gate' label"
          exit 1

      - name: Post review-bot-gate commit status
        # GH#21547: reusable-workflow caller-job naming produces "gate / review-bot-gate"
        # as the CheckRun name (GitHub prefixes with caller job id). Branch protection
        # requiring the bare "review-bot-gate" name would wait forever.
        # Mirror the maintainer-gate-reusable.yml pattern (lines 115-128, 213-218):
        # explicitly POST a StatusContext so branch protection sees "review-bot-gate".
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPO: ${{ github.repository }}
          GATE_PASSED: ${{ steps.check.outputs.gate_passed }}
          SKIP_GATE: ${{ steps.skip.outputs.skip }}
          RESULT: ${{ steps.check.outputs.result }}
        run: |
          # Resolve HEAD SHA. pull_request / pull_request_review expose it via
          # github.event.pull_request.head.sha. issue_comment does not — the event
          # is issue-scoped, so we fall back to a gh pr view lookup.
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if [[ -z "${HEAD_SHA}" ]]; then
            HEAD_SHA=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" \
              --json headRefOid --jq '.headRefOid' 2>/dev/null || true)
          fi
          if [[ -z "${HEAD_SHA}" ]]; then
            echo "::warning::Could not resolve HEAD SHA for PR #${PR_NUMBER} — skipping status post"
            exit 0
          fi

          if [[ "${GATE_PASSED}" == "true" ]] || [[ "${SKIP_GATE}" == "true" ]]; then
            STATE=success
            if [[ "${INFRA_DEFERRED}" == "true" ]]; then
              DESC="Review API unavailable — late feedback deferred post-merge"
            else
              DESC="Review bot gate passed (${RESULT:-SKIP})"
            fi
          elif [[ "${RESULT}" == "INFRA_RATE_LIMITED" ]]; then
            STATE=failure
            DESC="Review bot gate infrastructure wait — GitHub API quota exhausted"
          else
            STATE=failure
            DESC="Review bot gate WAITING — no real bot review yet"
          fi

          STATUS_EXIT=0
          STATUS_ERROR=$(mktemp)
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            --method POST \
            -f state="${STATE}" \
            -f context="review-bot-gate" \
            -f description="${DESC}" \
            2>"${STATUS_ERROR}" || STATUS_EXIT=$?

          if [[ "${STATUS_EXIT}" -ne 0 ]]; then
            cat "${STATUS_ERROR}" >&2
            if grep -qi 'API rate limit exceeded' "${STATUS_ERROR}"; then
              echo "::warning::GitHub API quota is exhausted; skipping immediate status retry until a later workflow run."
              rm -f "${STATUS_ERROR}"
              exit 0
            fi
            rm -f "${STATUS_ERROR}"
            if [[ "${STATE}" == "success" ]]; then
              echo "::warning::Review bot gate passed, but commit-status posting is unavailable in this token context; continuing with the workflow check as the gate signal."
              exit 0
            fi
            echo "::error::Failed to post review-bot-gate commit status"
            exit 1
          fi
          rm -f "${STATUS_ERROR}"
          echo "Posted review-bot-gate status: ${STATE} (${DESC})"

      - name: Summary
        if: always()
        env:
          GATE_PASSED: ${{ steps.check.outputs.gate_passed }}
          RESULT: ${{ steps.check.outputs.result }}
          SKIP_GATE: ${{ steps.skip.outputs.skip }}
          INFRA_DEFERRED: ${{ steps.check.outputs.infra_deferred }}
        run: |
          {
            echo "## Review Bot Gate"
            echo ""
            if [[ "${GATE_PASSED}" == "true" && "${INFRA_DEFERRED}" == "true" ]]; then
              echo "**Status**: PASSED (GitHub API unavailable; deferred review)"
              echo ""
              echo "The PR author is trusted and rate_limit_behavior=pass with"
              echo "non-strict completion. No API retry was attempted; late bot"
              echo "feedback is delegated to the post-merge review scanner."
            elif [[ "${GATE_PASSED}" == "true" && "${RESULT}" == "PASS_RATE_LIMITED" ]]; then
              echo "**Status**: PASSED (rate-limit grace)"
              echo ""
              echo "Bots are rate-limited (tried but capacity-constrained). Passing"
              echo "gate — configured to pass on rate limit (rate_limit_behavior=pass)."
              echo ""
              echo "Bot reviews will be addressed post-merge if needed."
            elif [[ "${GATE_PASSED}" == "true" && "${RESULT}" == "SKIP" ]]; then
              echo "**Status**: SKIPPED (skip-review-gate label)"
            elif [[ "${GATE_PASSED}" == "true" ]]; then
              echo "**Status**: PASSED"
              echo ""
              echo "At least one AI review bot has posted a real, settled review."
            elif [[ "${SKIP_GATE}" == "true" ]]; then
              echo "**Status**: SKIPPED (skip-review-gate label)"
            elif [[ "${RESULT}" == "INFRA_RATE_LIMITED" ]]; then
              echo "**Status**: INFRASTRUCTURE WAIT (GitHub API quota exhausted)"
              echo ""
              echo "Review policy was not evaluated. Re-run after quota reset;"
              echo "the gate did not infer that review feedback was missing."
            else
              echo "**Status**: WAITING"
              echo ""
              echo "No real AI review bot feedback yet. This check will re-run"
              echo "automatically when a bot posts or edits a review or comment."
              echo ""
              echo "If no bots are configured, add 'skip-review-gate' label to bypass."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
