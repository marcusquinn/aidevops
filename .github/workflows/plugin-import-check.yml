#
# t2134: Import-resolution check for .mjs plugin files.
# Catches broken import chains (like the oauth-pool-token-endpoint.mjs incident
# in PR #19229) by actually loading each plugin entry point via Node.js.
# node --check only verifies syntax, not that imports resolve.

name: Plugin Import Check

on:
  pull_request:
    paths:
      - '.agents/plugins/**/*.mjs'

concurrency:
  group: plugin-import-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  import-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check plugin import resolution
        run: |
          set -euo pipefail
          FAILED=0
          # Find all plugin directories that contain .mjs files
          for plugin_dir in .agents/plugins/*/; do
            [ -d "$plugin_dir" ] || continue
            # Find entry points: index.mjs or the main barrel file
            for entry in "$plugin_dir"*.mjs; do
              [ -f "$entry" ] || continue
              echo "Checking import: $entry"
              if node -e "import('./$entry').then(() => console.log('  OK: $entry')).catch(e => { console.error('  FAIL: $entry:', e.message); process.exit(1); })" 2>&1; then
                :
              else
                FAILED=$((FAILED + 1))
              fi
            done
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "::error::$FAILED plugin file(s) have broken import chains. Every import must resolve to an existing file."
            exit 1
          fi
          echo "All plugin imports resolve successfully."

      - name: Run plugin tests
        # Load-time import resolution (above) cannot catch ReferenceErrors at
        # call time — e.g. `export { X } from "./Y"` is re-export only and
        # doesn't create a local binding, so a module that also *calls* X
        # internally loads fine but throws at runtime. The tests/ directory
        # exercises these paths; keep them green to prevent regressions.
        #
        # We enumerate files via `find` rather than passing the directory
        # to `node --test` — the directory form was unreliable in Node 22
        # (tried to resolve the path as a module name: "Cannot find module
        # '.../tests'") whereas explicit file paths work consistently.
        run: |
          set -euo pipefail
          FAILED=0
          for plugin_dir in .agents/plugins/*/; do
            [ -d "${plugin_dir}tests" ] || continue
            TEST_FILES=$(find "${plugin_dir}tests" -name 'test-*.mjs' -type f | sort)
            [ -n "$TEST_FILES" ] || continue
            echo "Running tests under: ${plugin_dir}tests"
            # shellcheck disable=SC2086
            if ! node --test $TEST_FILES; then
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED plugin(s) have failing tests"
            exit 1
          fi
