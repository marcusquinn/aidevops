#
# Bounty Spam Auto-Close (t2925, GH#21100)
#
# Auto-detects and closes templated bounty-hunter spam PRs from external
# (non-collaborator) authors within ~1 minute of PR open. Distinct attack
# class from disclosure-spam (#20978) handled by the maintainer-gate.
#
# Canonical incident: marcusquinn/aidevops PRs #21077, #21094, #21101
# from carycooper777 on 2026-04-26 — a sock-puppet bot account
# (9 days old, 225 fork-only repos) filed three trivial PRs claiming
# "$1 paid bounty contributions" with `Closes #NNN` linking real issues.
# Each PR blocked dispatch on the linked issue and burned 3 review-bot CI
# runs until manual close.
#
# Trigger: pull_request_target on opened/edited/reopened. Uses base-ref
# checkout (default for pull_request_target — never executes fork code)
# and runs the deterministic detector at .agents/scripts/bounty-spam-detector.sh.
#
# Skip conditions (defense against false-positives):
#   - Author is OWNER, MEMBER, or COLLABORATOR
#   - Author is a bot (user.type == 'Bot')
#   - PR title has task ID prefix (`tNNN:` or `GH#NNN:`)
#
# These are the same trust signals used by pr-triage-gate.yml — keeps the
# bypass logic consistent across both gates.

name: Bounty Spam Auto-Close

on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  detect-and-close:
    name: Bounty Spam Detector
    runs-on: ubuntu-latest
    timeout-minutes: 3
    concurrency:
      group: bounty-spam-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    # Skip trusted authors and bots up front to save cycles.
    if: >-
      github.event.pull_request.user.type != 'Bot' &&
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'COLLABORATOR'

    steps:
      # Checkout BASE (default for pull_request_target — secure: never
      # executes fork code, so the detector script we run is the trusted
      # base-branch version).
      - name: Checkout base
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Run bounty-spam detector
        id: detect
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Bypass for internal task-ID prefixes (matches pr-triage-gate.yml).
          if [[ "$PR_TITLE" =~ ^t[0-9]+: ]] || [[ "$PR_TITLE" =~ ^GH#[0-9]+: ]]; then
            echo "PR title has internal task ID prefix — skipping bounty check."
            echo "verdict=bypassed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DETECTOR=".agents/scripts/bounty-spam-detector.sh"
          if [[ ! -x "$DETECTOR" ]]; then
            echo "Detector not found at $DETECTOR — skipping."
            echo "verdict=detector-missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # check returns 0=clean, 1=spam-likely, 2=ambiguous, 3=error.
          # Use is-spam (boolean) for the decision; capture full output
          # for the audit log.
          set +e
          OUTPUT=$("$DETECTOR" score pr "$PR_NUMBER" --repo "$REPO" 2>&1)
          RC=$?
          set -e

          echo "Detector output: $OUTPUT"
          echo "Detector rc: $RC"

          # Parse verdict from first pipe-delimited field.
          VERDICT=$(printf '%s\n' "$OUTPUT" | tail -n1 | cut -d'|' -f1)
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "detector_rc=$RC" >> "$GITHUB_OUTPUT"

          # Only auto-close on spam-likely (rc=1). Ambiguous and error stay open.
          if [[ "$RC" -eq 1 && "$VERDICT" == "spam-likely" ]]; then
            echo "should_close=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_close=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Close PR if spam-likely
        if: steps.detect.outputs.should_close == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DETECTOR=".agents/scripts/bounty-spam-detector.sh"
          # The detector composes the canonical dismissal comment and
          # closes the PR. Workflow-level wrapper for audit visibility.
          echo "Closing PR #${PR_NUMBER} from ${PR_AUTHOR} as bounty-hunter spam."
          "$DETECTOR" close pr "$PR_NUMBER" --repo "$REPO"

      - name: Apply bounty-spam-likely label (ambiguous case)
        if: >-
          steps.detect.outputs.verdict == 'ambiguous' &&
          steps.detect.outputs.should_close == 'false'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Ensure label exists; ignore "already exists" error.
          gh label create bounty-spam-likely \
            --repo "$REPO" \
            --description "PR matches some bounty-hunter spam patterns; needs maintainer triage" \
            --color FBCA04 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label bounty-spam-likely
          echo "Applied bounty-spam-likely label to PR #${PR_NUMBER} (ambiguous verdict)."
