name: Postflight Verification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to verify (leave empty for latest)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.tag || github.sha }}
  cancel-in-progress: true

jobs:
  postflight:
    name: Verify Release Health
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    permissions:
      contents: read
      checks: read
      security-events: read
    
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        ref: ${{ github.event.inputs.tag || github.ref }}
        fetch-depth: 0

    - name: Resolve release commit
      id: release_commit
      run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
      with:
        bun-version: latest
    
    - name: Wait for CI/CD Pipelines
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
        COMMIT_SHA: ${{ steps.release_commit.outputs.sha }}
      run: |
        echo "Waiting for release-owned check runs to complete..."
        echo "Note: Excluding issue/comment workflows and this workflow to avoid unrelated waits"
        sleep 60  # Initial wait for workflows to start
        
        # Poll for completion, excluding this workflow to avoid circular dependency
        SELF_NAME="Verify Release Health"
        for i in {1..20}; do
          CHECK_RUNS_RESPONSE=$(gh api --paginate --slurp \
            "repos/${REPO}/commits/${COMMIT_SHA}/check-runs?per_page=100" \
            | jq -c -f .github/scripts/flatten-check-run-pages.jq)
          RELEASE_RUNS_RESPONSE=$(gh api --paginate --slurp \
            "repos/${REPO}/actions/runs?head_sha=${COMMIT_SHA}&per_page=100")
          RELEASE_CHECK_RUNS=$(jq -c \
            --arg release_sha "$COMMIT_SHA" \
            --arg self_name "$SELF_NAME" \
            --slurpfile release_run_documents <(printf '%s\n' "$RELEASE_RUNS_RESPONSE") \
            -f .github/scripts/release-owned-check-runs.jq \
            <<<"$CHECK_RUNS_RESPONSE")
          PENDING=$(jq --arg self_name "$SELF_NAME" \
            '[.check_runs[] | select(.status != "completed")] | length' \
            <<<"$RELEASE_CHECK_RUNS")
          
          if [[ "$PENDING" == "0" ]]; then
            echo "All release-owned check runs completed"
            break
          fi
          
          # Show which workflows are still pending
          echo "Waiting for $PENDING check runs... (attempt $i/20)"
          jq -r --arg self_name "$SELF_NAME" \
            '.check_runs[] | select(.status != "completed") | "  - \(.name): \(.status)"' \
            <<<"$RELEASE_CHECK_RUNS" || true
          sleep 30
        done

        CHECK_RUNS_RESPONSE=$(gh api --paginate --slurp \
          "repos/${REPO}/commits/${COMMIT_SHA}/check-runs?per_page=100" \
          | jq -c -f .github/scripts/flatten-check-run-pages.jq)
        RELEASE_RUNS_RESPONSE=$(gh api --paginate --slurp \
          "repos/${REPO}/actions/runs?head_sha=${COMMIT_SHA}&per_page=100")
        RELEASE_CHECK_RUNS=$(jq -c \
          --arg release_sha "$COMMIT_SHA" \
          --arg self_name "$SELF_NAME" \
          --slurpfile release_run_documents <(printf '%s\n' "$RELEASE_RUNS_RESPONSE") \
          -f .github/scripts/release-owned-check-runs.jq \
          <<<"$CHECK_RUNS_RESPONSE")
        REMAINING=$(jq '[.check_runs[] | select(.status != "completed")] | length' \
          <<<"$RELEASE_CHECK_RUNS")
        ADVISORY_PENDING=$(jq '[.advisory_check_runs[]? | select(.status != "completed")] | length' \
          <<<"$RELEASE_CHECK_RUNS")
        if [[ "$ADVISORY_PENDING" != "0" ]]; then
          echo "::warning::$ADVISORY_PENDING non-required advisory check(s) remain non-terminal"
          jq -r '.advisory_check_runs[] | select(.status != "completed") | "  - Advisory: \(.name): \(.status)"' \
            <<<"$RELEASE_CHECK_RUNS" || true
        fi
        if [[ "$REMAINING" != "0" ]]; then
          echo "::error::$REMAINING release-owned check runs remained non-terminal after timeout"
          jq -r '.check_runs[] | select(.status != "completed") | "  - \(.name): \(.status)"' \
            <<<"$RELEASE_CHECK_RUNS" || true
          exit 1
        fi
    
    - name: Verify CI/CD Status
      id: cicd
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
        COMMIT_SHA: ${{ steps.release_commit.outputs.sha }}
      run: |
        echo "## CI/CD Pipeline Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Select the latest completed run for each check name/app pair. GitHub
        # retains superseded runs on a commit, so counting every historical
        # cancellation can incorrectly fail an otherwise healthy release.
        SELF_NAME="Verify Release Health"
        CHECK_RUNS_RESPONSE=$(gh api --paginate --slurp \
          "repos/${REPO}/commits/${COMMIT_SHA}/check-runs?per_page=100" \
          | jq -c -f .github/scripts/flatten-check-run-pages.jq)
        RELEASE_RUNS_RESPONSE=$(gh api --paginate --slurp \
          "repos/${REPO}/actions/runs?head_sha=${COMMIT_SHA}&per_page=100")
        RELEASE_CHECK_RUNS=$(jq -c \
          --arg release_sha "$COMMIT_SHA" \
          --arg self_name "$SELF_NAME" \
          --slurpfile release_run_documents <(printf '%s\n' "$RELEASE_RUNS_RESPONSE") \
          -f .github/scripts/release-owned-check-runs.jq \
          <<<"$CHECK_RUNS_RESPONSE")
        EFFECTIVE_CHECK_RUNS=$(echo "$RELEASE_CHECK_RUNS" \
          | jq -c --arg self_name "$SELF_NAME" -f .github/scripts/effective-check-runs.jq)

        # A later push to the default branch can cancel checks on the release
        # commit via cancel-in-progress. Accept only a successful check with the
        # same name/app on a descendant default-branch commit; real failures and
        # cancellations without descendant proof remain blocking.
        DESCENDANT_CHECK_RUNS='[]'
        DEFAULT_BRANCH=$(gh api "repos/${REPO}" --jq '.default_branch // empty' 2>/dev/null || true)
        DEFAULT_SHA=$(gh api "repos/${REPO}/commits/${DEFAULT_BRANCH}" --jq '.sha // empty' 2>/dev/null || true)
        if [[ -n "$DEFAULT_SHA" && "$DEFAULT_SHA" != "$COMMIT_SHA" ]]; then
          COMPARE_STATUS=$(gh api "repos/${REPO}/compare/${COMMIT_SHA}...${DEFAULT_SHA}" --jq '.status // empty' 2>/dev/null || true)
          if [[ "$COMPARE_STATUS" == "ahead" || "$COMPARE_STATUS" == "identical" ]]; then
            DESCENDANT_RESPONSE=$(gh api --paginate --slurp \
              "repos/${REPO}/commits/${DEFAULT_SHA}/check-runs?per_page=100" 2>/dev/null \
              | jq -c -f .github/scripts/flatten-check-run-pages.jq || true)
            if [[ -n "$DESCENDANT_RESPONSE" ]]; then
              DESCENDANT_CHECK_RUNS=$(echo "$DESCENDANT_RESPONSE" \
                | jq -c --arg self_name "$SELF_NAME" -f .github/scripts/effective-check-runs.jq)
            fi
          fi
        fi
        # Stream large API responses through file descriptors instead of argv.
        # Check-run output payloads can exceed the runner's ARG_MAX limit.
        CHECK_RUNS=$(jq -cn \
          --slurpfile current_run_documents <(printf '%s\n' "$EFFECTIVE_CHECK_RUNS") \
          --slurpfile descendant_run_documents <(printf '%s\n' "$DESCENDANT_CHECK_RUNS") \
          -f .github/scripts/reconcile-superseded-cancellations.jq \
          | jq -c '.[] | {name, status, conclusion, app: (.app.slug // .app.name // "unknown"), superseded_by_check_run_id}')
        
        # Count results (excluding self)
        TOTAL=$(echo "$CHECK_RUNS" | jq -s 'length')
        PASSED=$(echo "$CHECK_RUNS" | jq -s '[.[] | select(.conclusion == "success")] | length')
        SKIPPED=$(echo "$CHECK_RUNS" | jq -s '[.[] | select(.conclusion == "skipped")] | length')
        FAILED=$(echo "$CHECK_RUNS" | jq -s '[.[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required")] | length')

        if [[ "$TOTAL" == "0" ]]; then
          echo "::error::No terminal check-run evidence exists for release commit ${COMMIT_SHA}"
          exit 1
        fi
        
        echo "| Check | Status | Conclusion |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|------------|" >> $GITHUB_STEP_SUMMARY
        
        # Show the effective check runs used for pass/fail decisions.
        echo "$CHECK_RUNS" | jq -rs '.[] | "| \(.name) | \(.status) | \(.conclusion // "pending") |"' >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Note: latest completed run per check name/app is used; descendant success may replace a superseded cancellation; 'Verify Release Health' is excluded*" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Total**: $TOTAL | **Passed**: $PASSED | **Skipped**: $SKIPPED | **Failed**: $FAILED" >> $GITHUB_STEP_SUMMARY
        
        # Separate critical workflow failures from advisory tool failures
        # Critical: core CI checks (Security Validation, Framework Validation, Version Consistency)
        # Advisory: external analysis tools that fail intermittently (non-blocking)
        # Pipe-delimited list of exact check names to treat as advisory
        ADVISORY_NAMES="SonarCloud Code Analysis"
        
        CRITICAL_FAILED=$(echo "$CHECK_RUNS" | jq -s --arg names "$ADVISORY_NAMES" \
          '($names | split("|")) as $adv |
           [.[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required") | select(.name as $n | $adv | index($n) | not)] | length')
        ADVISORY_FAILED=$(echo "$CHECK_RUNS" | jq -s --arg names "$ADVISORY_NAMES" \
          '($names | split("|")) as $adv |
           [.[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required") | select(.name as $n | $adv | index($n))] | length')
        
        if [[ "$ADVISORY_FAILED" != "0" ]]; then
          echo "::warning::$ADVISORY_FAILED advisory check(s) failed (non-blocking)"
          echo "$CHECK_RUNS" | jq -rs --arg names "$ADVISORY_NAMES" \
            '($names | split("|")) as $adv |
             .[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required") | select(.name as $n | $adv | index($n)) | "  Advisory failure: \(.name) (\(.conclusion))"'
        fi
        
        if [[ "$CRITICAL_FAILED" != "0" ]]; then
          echo "::error::$CRITICAL_FAILED critical check run(s) failed"
          echo "$CHECK_RUNS" | jq -rs --arg names "$ADVISORY_NAMES" \
            '($names | split("|")) as $adv |
             .[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required") | select(.name as $n | $adv | index($n) | not) | "  Critical failure: \(.name) (\(.conclusion))"'
          echo "cicd_status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi
        
        if [[ "$ADVISORY_FAILED" != "0" ]]; then
          echo "cicd_status=warning" >> $GITHUB_OUTPUT
        else
          echo "cicd_status=passed" >> $GITHUB_OUTPUT
        fi
        echo "CI/CD critical checks passed"
    
    - name: Check SonarCloud Quality Gate
      if: always()
      id: sonarcloud
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## SonarCloud Analysis" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Get quality gate status
        QG_RESPONSE=$(curl -s "https://sonarcloud.io/api/qualitygates/project_status?projectKey=marcusquinn_aidevops")
        STATUS=$(echo "$QG_RESPONSE" | jq -r '.projectStatus.status // "UNKNOWN"')
        
        echo "**Quality Gate**: $STATUS" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Get metrics
        METRICS=$(curl -s "https://sonarcloud.io/api/measures/component?component=marcusquinn_aidevops&metricKeys=bugs,vulnerabilities,code_smells,security_hotspots")
        
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "$METRICS" | jq -r '.component.measures[] | "| \(.metric) | \(.value) |"' >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
        
        if [[ "$STATUS" == "ERROR" ]]; then
          echo "::warning::SonarCloud quality gate failed"
          echo "sonar_status=failed" >> $GITHUB_OUTPUT
        elif [[ "$STATUS" == "OK" ]]; then
          echo "sonar_status=passed" >> $GITHUB_OUTPUT
        else
          echo "sonar_status=unknown" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true
    
    - name: Generate Final Report
      id: report
      if: always()
      env:
        CICD_STATUS: ${{ steps.cicd.outputs.cicd_status }}
        SONAR_STATUS: ${{ steps.sonarcloud.outputs.sonar_status }}
        RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        COMMIT_SHA: ${{ steps.release_commit.outputs.sha }}
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Postflight Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Default unset outputs to 'skipped' (step didn't produce output)
        CICD="${CICD_STATUS:-skipped}"
        SONAR="${SONAR_STATUS:-skipped}"
        
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| CI/CD Pipelines | ${CICD} |" >> $GITHUB_STEP_SUMMARY
        echo "| SonarCloud | ${SONAR} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Release**: ${RELEASE_TAG}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: ${COMMIT_SHA}" >> $GITHUB_STEP_SUMMARY
        echo "**Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Generated by AI DevOps Framework Postflight Verification*" >> $GITHUB_STEP_SUMMARY
        
        # Determine overall result
        # Critical failures: terminal CI/CD hard failures.
        HAS_CRITICAL=false
        HAS_WARNING=false
        
        if [[ "$CICD" == "failed" ]]; then
          HAS_CRITICAL=true
        fi
        # Warnings: advisory failures or SonarCloud issues.
        if [[ "$CICD" == "warning" || "$SONAR" == "failed" ]]; then
          HAS_WARNING=true
        fi
        
        if [[ "$HAS_CRITICAL" == "true" ]]; then
          echo "::error::Postflight verification failed for release ${RELEASE_TAG}"
          echo ""
          echo "Recommended actions:"
          echo "1. Review the failed checks in the workflow summary"
          echo "2. If critical issues found, consider rollback"
          echo "3. See: .agents/workflows/postflight.md#rollback-procedures"
          exit 1
        elif [[ "$HAS_WARNING" == "true" ]]; then
          echo "::warning::Postflight completed with warnings for release ${RELEASE_TAG}"
          echo "Review advisory warnings above and address in next release if needed."
        else
          echo "Postflight verification passed for release ${RELEASE_TAG}"
        fi
