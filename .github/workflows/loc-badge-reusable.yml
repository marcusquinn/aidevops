name: Repository Metrics (reusable) — generate local README data and badges

# Reusable workflow — call via a thin caller YAML in each repo.
# See: .agents/templates/workflows/loc-badge-caller.yml
# See: .agents/aidevops/badges.md
#
# Generates committed local artifacts:
#   docs/metrics/repo-metrics.json
#   docs/metrics/repo-metrics.md
#   docs/metrics/badges/{loc,languages,dependencies}.svg
#
# It also writes legacy .github/badges/loc-total.svg and loc-languages.svg so
# older aidevops-managed README blocks keep rendering while repos migrate.
#
# The scanner is dependency-light (Python stdlib + git) and skips outputs that
# are already fresh by default, avoiding per-PR delays and noisy badge commits.

on:
  workflow_call:
    inputs:
      aidevops_ref:
        description: 'aidevops ref to fetch the metrics helper from (main, vX.Y.Z, or sha)'
        required: false
        type: string
        default: 'main'
      output_dir:
        description: 'Directory to write repo-metrics.json/md to'
        required: false
        type: string
        default: 'docs/metrics'
      badge_dir:
        description: 'Directory to write README SVG badges to'
        required: false
        type: string
        default: 'docs/metrics/badges'
      legacy_badge_dir:
        description: 'Directory for legacy loc-total/loc-languages SVGs'
        required: false
        type: string
        default: '.github/badges'
      top_n:
        description: 'Top-N languages in the language breakdown SVG'
        required: false
        type: number
        default: 6
      extra_excludes:
        description: 'Newline-separated extra path patterns to exclude'
        required: false
        type: string
        default: ''
      skip_if_fresh_hours:
        description: 'Skip generation when committed metrics are newer than this many hours'
        required: false
        type: number
        default: 24
      commit_message:
        description: 'Commit message subject for metrics updates'
        required: false
        type: string
        default: 'chore(metrics): refresh repository metrics [skip ci]'
      runner:
        description: 'Runner label override. Defaults to ubuntu-latest.'
        required: false
        default: 'ubuntu-latest'
        type: string
    secrets:
      SYNC_PAT:
        required: false
        description: 'Fine-grained PAT with Contents:read/write, bypasses branch protection on default-branch push'

jobs:
  generate:
    name: Generate repository metrics
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    concurrency:
      group: repo-metrics-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Skip if commit was made by GitHub Actions
        id: check-author
        env:
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          if [[ "$COMMIT_AUTHOR" == "GitHub Actions" ]] || [[ "$COMMIT_AUTHOR" == "github-actions[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: commit was made by GitHub Actions (loop prevention)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check SYNC_PAT visibility
        if: steps.check-author.outputs.skip != 'true'
        env:
          SYNC_PAT_PRESENT: ${{ secrets.SYNC_PAT != '' && 'true' || '' }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "${SYNC_PAT_PRESENT:-}" ]]; then
            echo "::warning::SYNC_PAT not present in this run — metrics commit may be rejected by branch protection."
            echo "::warning::Set with: gh secret set SYNC_PAT --repo ${REPO} (Contents: Read and write)"
          else
            echo "::notice::SYNC_PAT present — metrics commit will use PAT"
          fi

      - name: Checkout repository
        if: steps.check-author.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}

      - name: Checkout aidevops framework scripts
        if: steps.check-author.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: marcusquinn/aidevops
          path: __aidevops
          ref: ${{ inputs.aidevops_ref || 'main' }}
          fetch-depth: 1

      - name: Build extra-excludes args
        id: excludes
        if: steps.check-author.outputs.skip != 'true'
        env:
          EXTRA_EXCLUDES: ${{ inputs.extra_excludes }}
        run: |
          ARGS=""
          if [[ -n "${EXTRA_EXCLUDES:-}" ]]; then
            while IFS= read -r pat; do
              [[ -z "$pat" ]] && continue
              ARGS="$ARGS --exclude $pat"
            done <<< "$EXTRA_EXCLUDES"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Generate repository metrics
        if: steps.check-author.outputs.skip != 'true'
        env:
          OUTPUT_DIR: ${{ inputs.output_dir }}
          BADGE_DIR: ${{ inputs.badge_dir }}
          LEGACY_BADGE_DIR: ${{ inputs.legacy_badge_dir }}
          TOP_N: ${{ inputs.top_n }}
          SKIP_IF_FRESH_HOURS: ${{ inputs.skip_if_fresh_hours }}
          EXTRA_ARGS: ${{ steps.excludes.outputs.args }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          bash __aidevops/.agents/scripts/repo-metrics-helper.sh generate \
            --output-dir "$OUTPUT_DIR" \
            --badge-dir "$BADGE_DIR" \
            --legacy-badge-dir "$LEGACY_BADGE_DIR" \
            --top "$TOP_N" \
            --skip-if-fresh-hours "$SKIP_IF_FRESH_HOURS" \
            $EXTRA_ARGS

      - name: Configure Git
        if: steps.check-author.outputs.skip != 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Commit and push if metrics changed
        if: steps.check-author.outputs.skip != 'true'
        env:
          OUTPUT_DIR: ${{ inputs.output_dir }}
          BADGE_DIR: ${{ inputs.badge_dir }}
          LEGACY_BADGE_DIR: ${{ inputs.legacy_badge_dir }}
          COMMIT_SUBJECT: ${{ inputs.commit_message }}
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain -- "$OUTPUT_DIR" "$BADGE_DIR" "$LEGACY_BADGE_DIR")" ]]; then
            echo "No repository metrics changes to commit"
            exit 0
          fi
          git add "$OUTPUT_DIR" "$BADGE_DIR" "$LEGACY_BADGE_DIR"
          git commit -m "$COMMIT_SUBJECT"
          for i in 1 2 3; do
            echo "Push attempt $i..."
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            sleep $((i * 3))
          done
          echo "::warning::Failed to push repository metrics updates after 3 attempts (likely branch protection without SYNC_PAT)"
          exit 0
